<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduVerify — Verification Schedule (Orientation Week)</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com/3.4.3"></script>
<style>
  body { font-family:'Inter',system-ui,-apple-system,sans-serif; background:#f7f8fc; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width:8px;height:8px; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1;border-radius:8px; }
  .ev-input{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.45rem .65rem;outline:none;font-size:.85rem}
  .ev-input:focus{box-shadow:0 0 0 3px #c7d2fe}
  table.tight th, table.tight td { padding:6px 10px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback, useMemo } = React;

/* ====================== shared API ====================== */
const AUTH_KEY = "ev_auth";
function loadAuth() { try { return JSON.parse(localStorage.getItem(AUTH_KEY) || "null"); } catch (e) { return null; } }
const auth = loadAuth();

async function api(method, path, body) {
  const headers = {};
  if (auth?.token) headers["Authorization"] = "Bearer " + auth.token;
  if (body !== undefined) headers["Content-Type"] = "application/json";
  const res = await fetch(path, { method, headers, body: body !== undefined ? JSON.stringify(body) : undefined });
  let data = {}; try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
  return data;
}
const get = (p) => api("GET", p);
const post = (p, b) => api("POST", p, b);
const patch = (p, b) => api("PATCH", p, b);

const STATUS_COLORS = {
  open:       "bg-slate-100 text-slate-600 border-slate-300",
  booked:     "bg-blue-100 text-blue-700 border-blue-300",
  pending:    "bg-yellow-100 text-yellow-800 border-yellow-300",
  verified:   "bg-green-100 text-green-700 border-green-300",
  absent:     "bg-rose-100 text-rose-700 border-rose-300",
  reassigned: "bg-purple-100 text-purple-700 border-purple-300",
};
const STATUS_BAR_BG = {
  verified: "bg-green-500",
  pending:  "bg-yellow-400",
  booked:   "bg-blue-400",
  absent:   "bg-rose-500",
  reassigned: "bg-purple-400",
};

function StatusPill({ s }) {
  const cls = STATUS_COLORS[s] || STATUS_COLORS.open;
  return <span className={`text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded border ${cls}`}>{s}</span>;
}
function fmtDate(d) { return d ? String(d).slice(0,10) : "—"; }
function fmtTs(d) { if (!d) return "—"; try { const x = new Date(d); return x.toLocaleString(); } catch(e){return String(d);} }
function parseTimeLabel(label) {
  const s = String(label || "").trim();
  const m12 = s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (m12) {
    let h = parseInt(m12[1], 10);
    const mm = parseInt(m12[2], 10);
    const ap = m12[3].toUpperCase();
    if (ap === "PM" && h !== 12) h += 12;
    if (ap === "AM" && h === 12) h = 0;
    return h * 60 + mm;
  }
  const m24 = s.match(/^(\d{1,2}):(\d{2})$/);
  if (m24) return parseInt(m24[1], 10) * 60 + parseInt(m24[2], 10);
  return null;
}
function labelToTimeInput(label) {
  const mins = parseTimeLabel(label);
  if (mins == null) return "";
  const h = Math.floor(mins / 60);
  const mm = String(mins % 60).padStart(2, "0");
  return `${String(h).padStart(2, "0")}:${mm}`;
}
function addMinutesToTimeInput(val, minutes) {
  const mins = parseTimeLabel(val);
  if (mins == null) return "";
  const total = mins + minutes;
  const h = Math.floor(total / 60) % 24;
  const mm = String(total % 60).padStart(2, "0");
  return `${String(h).padStart(2, "0")}:${mm}`;
}

/* ====================== root ====================== */
function App() {
  if (!auth || auth.role !== "admin") {
    return (
      <div className="max-w-md mx-auto mt-20 p-6 bg-white border border-slate-200 rounded-2xl text-center">
        <div className="text-lg font-bold text-slate-800">Verification Cell login required</div>
        <div className="text-sm text-slate-600 mt-2">Open the main portal and sign in as an admin, then return here.</div>
        <a href="/" className="inline-block mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg">← Back to portal</a>
      </div>
    );
  }
  const [tab, setTab] = useState("overview");
  const isSupervisor = auth.adminRole === "supervisor";

  const [stats, setStats] = useState(null);
  const [meta, setMeta]   = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [pauseRefresh, setPauseRefresh] = useState(false);
  const [err, setErr] = useState("");

  const reload = useCallback(async () => {
    setRefreshing(true);
    try {
      const [s, m] = await Promise.all([get("/api/admin/verify/stats"), get("/api/admin/verify/meta")]);
      setStats(s); setMeta(m); setErr("");
    } catch (e) { setErr(e.message); }
    setRefreshing(false);
  }, []);
  useEffect(() => { reload(); }, [reload]);
  /* v10 — auto-refresh stats every 10 s on Overview and Day Detail (paused while reassigning) */
  useEffect(() => {
    if (pauseRefresh) return;
    if (tab !== "overview" && tab !== "day") return;
    const id = setInterval(reload, 10000);
    return () => clearInterval(id);
  }, [reload, tab, pauseRefresh]);

  return (
    <div className="min-h-screen flex flex-col">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3 flex-wrap">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-600 to-blue-500 grid place-content-center text-white font-bold">EV</div>
            <div>
              <div className="font-bold text-slate-800 leading-tight">EduVerify · Verification Schedule</div>
              <div className="text-[11px] text-slate-500 -mt-0.5">Orientation week · 4 days · 15 rooms · 32 students/room</div>
            </div>
          </div>
          <div className="flex items-center gap-3 text-sm">
            <span className="hidden sm:inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg">
              <span className="w-2 h-2 rounded-full bg-indigo-500"></span>
              {auth.name} · {auth.staffId}
              <span className="text-[10px] uppercase bg-indigo-200 px-1.5 py-0.5 rounded">{auth.adminRole}</span>
            </span>
            <a href="/" className="text-slate-500 hover:text-slate-800">← Main portal</a>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 -mb-px">
          <nav className="flex gap-1 flex-wrap">
            {[["overview","Overview"],["day","Day Detail"],["export","Export"]].map(([k,l]) => (
              <button key={k} onClick={()=>setTab(k)}
                className={`px-4 py-2 text-sm border-b-2 ${tab===k?'border-indigo-600 text-indigo-700 font-semibold':'border-transparent text-slate-500'}`}>
                {l}
              </button>
            ))}
            <div className="ml-auto py-2 text-xs text-slate-400">{refreshing ? "Refreshing…" : <button onClick={reload} className="hover:underline">↻ Refresh</button>}</div>
          </nav>
        </div>
      </header>

      <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
        {err && <div className="text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2 mb-3">{err}</div>}
        {tab === "overview" && <Overview stats={stats} />}
        {tab === "day"      && <DayDetail stats={stats} meta={meta} reload={reload} isSupervisor={isSupervisor} pauseRefresh={pauseRefresh} setPauseRefresh={setPauseRefresh} />}
        {tab === "export"   && <ExportTab meta={meta} />}
      </main>

      <footer className="bg-white border-t border-slate-200">
        <div className="max-w-7xl mx-auto px-6 py-3 text-xs text-slate-500">© EduVerify · Verification schedule module</div>
      </footer>
    </div>
  );
}

/* ====================== Overview ====================== */
function Overview({ stats }) {
  if (!stats) return <Spinner label="Loading statistics…" />;
  const o = stats.overall;
  return (
    <div className="space-y-6">
      <section>
        <h2 className="text-lg font-bold text-slate-800">Overall (4-day) summary</h2>
        <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3 mt-3">
          <Tile label="Total slots"   v={o.total}      tone="slate" />
          <Tile label="Scheduled"     v={o.scheduled}  tone="indigo" />
          <Tile label="Verified"      v={o.verified}   tone="green"  big />
          <Tile label="Pending"       v={o.pending}    tone="yellow" />
          <Tile label="Booked"        v={o.booked}     tone="blue" />
          <Tile label="Absent"        v={o.absent}     tone="rose" />
          <Tile label="Reassigned"    v={o.reassigned} tone="purple" />
          <Tile label="Completion %"  v={o.completionPct + "%"} tone={o.completionPct>=80?"green":o.completionPct>=50?"yellow":"rose"} />
        </div>
      </section>

      <section>
        <h2 className="text-lg font-bold text-slate-800">Day-wise breakdown</h2>
        <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-3 mt-3">
          {stats.byDate.length === 0 && <div className="text-sm text-slate-500">No schedule data yet. Add students with a <b>verification_date</b> via <a href="/" className="text-indigo-600 underline">Bulk Upload</a> on the main portal.</div>}
          {stats.byDate.map((d) => (
            <div key={d.date} className="border border-slate-200 bg-white rounded-2xl p-4">
              <div className="flex items-center justify-between">
                <div className="font-bold text-slate-800">{fmtDate(d.date)}</div>
                <span className={`text-xs font-semibold px-2 py-0.5 rounded ${d.completionPct>=80?'bg-green-100 text-green-700':d.completionPct>=50?'bg-yellow-100 text-yellow-800':'bg-slate-100 text-slate-600'}`}>{d.completionPct}%</span>
              </div>
              <div className="text-xs text-slate-500">Scheduled: <b className="text-slate-700">{d.scheduled}</b> / {d.total}</div>
              <div className="w-full h-2 mt-2 bg-slate-100 rounded-full overflow-hidden flex">
                <div className={`h-full ${STATUS_BAR_BG.verified}`}   style={{width: `${(d.verified/Math.max(d.scheduled,1))*100}%`}} title={`Verified ${d.verified}`}></div>
                <div className={`h-full ${STATUS_BAR_BG.pending}`}    style={{width: `${(d.pending/Math.max(d.scheduled,1))*100}%`}}  title={`Pending ${d.pending}`}></div>
                <div className={`h-full ${STATUS_BAR_BG.booked}`}     style={{width: `${(d.booked/Math.max(d.scheduled,1))*100}%`}}   title={`Booked ${d.booked}`}></div>
                <div className={`h-full ${STATUS_BAR_BG.absent}`}     style={{width: `${(d.absent/Math.max(d.scheduled,1))*100}%`}}   title={`Absent ${d.absent}`}></div>
              </div>
              <div className="grid grid-cols-3 gap-2 text-[11px] mt-3">
                <span className="text-green-700">✓ {d.verified} verified</span>
                <span className="text-yellow-700">⏳ {d.pending} pending</span>
                <span className="text-blue-700">📌 {d.booked} booked</span>
                <span className="text-rose-700">⌀ {d.absent} absent</span>
                <span className="text-purple-700">↻ {d.reassigned} reassigned</span>
                <span className="text-slate-500">{d.openSlots} open</span>
              </div>
            </div>
          ))}
        </div>
      </section>

    </div>
  );
}

function Tile({ label, v, tone, big }) {
  const map = {
    slate:"bg-slate-50 text-slate-800", indigo:"bg-indigo-50 text-indigo-700",
    green:"bg-green-50 text-green-700", yellow:"bg-yellow-50 text-yellow-800",
    blue:"bg-blue-50 text-blue-700", rose:"bg-rose-50 text-rose-700",
    purple:"bg-purple-50 text-purple-700",
  };
  return (
    <div className={`rounded-2xl p-3 ${map[tone]||map.slate}`}>
      <div className="text-[10px] uppercase tracking-wider opacity-80">{label}</div>
      <div className={`${big?'text-3xl':'text-2xl'} font-bold mt-1`}>{v}</div>
    </div>
  );
}

/* ====================== Day Detail ====================== */
function DayDetail({ stats, meta, reload, isSupervisor, pauseRefresh, setPauseRefresh }) {
  const dates = stats?.byDate?.map(d => d.date) || meta?.dates || [];
  const rooms = meta?.rooms || [];
  const [date, setDate] = useState(dates[0] || "");
  useEffect(() => { if (!date && dates.length) setDate(dates[0]); }, [dates, date]);
  const dayMeta = stats?.byDate?.find(d => d.date === date);
  const rowsForDate = (stats?.byDateRoom || {})[String(date)] || [];

  const [list, setList] = useState({ rows: [], total: 0 });
  const [filters, setFilters] = useState({ room: "", status: "", q: "" });
  const [loading, setLoading] = useState(false);
  const [listErr, setListErr] = useState("");

  const loadList = useCallback(async () => {
    if (!date) return;
    setLoading(true);
    setListErr("");
    try {
      const params = new URLSearchParams({ date });
      if (filters.room)   params.set("room",   filters.room);
      if (filters.status) params.set("status", filters.status);
      if (filters.q)      params.set("q",      filters.q);
      const r = await get("/api/admin/verify/students?" + params.toString());
      setList({ rows: r.rows, total: r.total });
    } catch (e) { setListErr(e.message); }
    setLoading(false);
  }, [date, filters]);
  useEffect(() => { loadList(); }, [loadList]);
  useEffect(() => {
    if (pauseRefresh) return;
    const id = setInterval(loadList, 10000);
    return () => clearInterval(id);
  }, [loadList, pauseRefresh]);

  const setStatus = async (id, newStatus, remarks) => {
    try { await patch(`/api/admin/verify/assignment/${id}`, { status: newStatus, remarks }); await loadList(); reload(); }
    catch (e) { alert(e.message); }
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center gap-3 flex-wrap">
        <label className="text-sm text-slate-600">Day:</label>
        <select value={date} onChange={e=>setDate(e.target.value)} className="ev-input w-auto">
          {dates.map(d => <option key={d} value={d}>{fmtDate(d)}</option>)}
          {dates.length === 0 && <option value="">No dates yet</option>}
        </select>
        {dayMeta && (
          <div className="text-xs text-slate-600">
            Scheduled <b>{dayMeta.scheduled}</b> · Verified <b className="text-green-700">{dayMeta.verified}</b> · Pending <b className="text-yellow-700">{dayMeta.pending}</b> · Absent <b className="text-rose-700">{dayMeta.absent}</b> · Completion <b>{dayMeta.completionPct}%</b>
          </div>
        )}
      </div>


      {rowsForDate.length > 0 && (
        <div className="flex flex-wrap gap-2 text-xs">
          {rowsForDate.map(r => (
            <span key={r.room} className="bg-white border border-slate-200 rounded-lg px-2 py-1">{r.room}: <b>{r.scheduled}</b> scheduled · <span className="text-green-700">{r.verified}✓</span></span>
          ))}
        </div>
      )}

      <section>
        <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
          <h3 className="font-semibold text-slate-700 text-sm">Student list ({list.total})</h3>
          <div className="flex gap-2 flex-wrap">
            <select value={filters.room} onChange={e=>setFilters({...filters, room:e.target.value})} className="ev-input w-auto">
              <option value="">All rooms</option>
              {rooms.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
            <select value={filters.status} onChange={e=>setFilters({...filters, status:e.target.value})} className="ev-input w-auto">
              <option value="">All statuses</option>
              {(meta?.statuses || []).filter(s => s !== "open").map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <input value={filters.q} onChange={e=>setFilters({...filters, q:e.target.value})} placeholder="Search name / app no" className="ev-input w-60" />
          </div>
        </div>
        {listErr && <div className="text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2 mb-2">{listErr}</div>}
        <div className="overflow-x-auto bg-white border border-slate-200 rounded-2xl">
          <table className="min-w-full text-sm tight">
            <thead className="bg-slate-50 text-slate-600 text-xs uppercase">
              <tr>
                <th className="text-left">App No</th>
                <th className="text-left">Name</th>
                <th className="text-left">Program</th>
                <th className="text-left">Room</th>
                <th className="text-left">Slot</th>
                <th className="text-left">Time</th>
                <th className="text-left">Status</th>
                <th className="text-left">Actions</th>
              </tr>
            </thead>
            <tbody>
              {loading && <tr><td colSpan="8" className="px-4 py-6 text-center text-slate-400">Loading…</td></tr>}
              {!loading && list.rows.map((r) => (
                <tr key={r.id} className="border-t border-slate-100">
                  <td className="font-mono text-xs">{r.student?.appNo || "—"}</td>
                  <td>{r.student?.name || <span className="text-slate-400">— empty —</span>}</td>
                  <td className="text-slate-600">{r.student?.program || "—"}</td>
                  <td className="text-slate-600">{r.room || "—"}</td>
                  <td className="text-slate-600">{r.slotNo != null ? `#${r.slotNo}` : "—"}</td>
                  <td className="text-slate-600">{r.startTime || "—"}{r.endTime ? ` – ${r.endTime}` : ""}</td>
                  <td><StatusPill s={r.status} /></td>
                  <td className="relative"><ActionMenu row={r} isSupervisor={isSupervisor} setStatus={setStatus} reload={reload} loadList={loadList} setPauseRefresh={setPauseRefresh} /></td>
                </tr>
              ))}
              {!loading && list.rows.length === 0 && <tr><td colSpan="8" className="px-4 py-6 text-center text-slate-400">No rows match.</td></tr>}
            </tbody>
          </table>
        </div>
      </section>
    </div>
  );
}

function ActionMenu({ row, isSupervisor, setStatus, reload, loadList, setPauseRefresh }) {
  const [showReassign, setShowReassign] = useState(false);
  if (!row.student) return <span className="text-slate-300 text-xs">—</span>;
  const openReassign = () => { setPauseRefresh(true); setShowReassign(true); };
  const closeReassign = () => { setShowReassign(false); setPauseRefresh(false); };
  return (
    <div className="flex items-center gap-1 flex-wrap">
      {row.status !== "verified" && <button onClick={()=>setStatus(row.id, "verified")} className="text-[11px] bg-green-600 text-white px-2 py-0.5 rounded">✓ Verify</button>}
      {row.status !== "pending" && row.status !== "open" && <button onClick={()=>setStatus(row.id, "pending")} className="text-[11px] bg-yellow-500 text-white px-2 py-0.5 rounded">⏳ Pending</button>}
      {row.status !== "absent" && row.status !== "open" && <button onClick={()=>setStatus(row.id, "absent")} className="text-[11px] bg-rose-600 text-white px-2 py-0.5 rounded">⌀ Absent</button>}
      <button onClick={openReassign} className="text-[11px] border border-purple-300 text-purple-700 px-2 py-0.5 rounded">↻ Reassign</button>
      {showReassign && (
        <ReassignForm row={row} close={closeReassign} onDone={()=>{ loadList(); reload(); }} />
      )}
    </div>
  );
}

function ReassignForm({ row, close, onDone }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr]   = useState("");
  const [date, setDate] = useState(row.date ? String(row.date).slice(0, 10) : "");
  const [room, setRoom] = useState(row.room || "");
  const [startTime, setStartTime] = useState(labelToTimeInput(row.startTime) || "13:00");
  const [endTime, setEndTime] = useState(labelToTimeInput(row.endTime) || addMinutesToTimeInput(labelToTimeInput(row.startTime) || "13:00", 10));
  const [auto, setAuto] = useState(false);
  const [remarks, setRemarks] = useState("");
  const submit = async () => {
    setBusy(true); setErr("");
    try {
      const body = auto
        ? { remarks: remarks || null }
        : {
            date: date || undefined,
            room: room || undefined,
            startTime: startTime || undefined,
            endTime: endTime || undefined,
            remarks: remarks || null,
          };
      await post(`/api/admin/verify/assignment/${row.id}/reassign`, body);
      close(); onDone();
    } catch (e) { setErr(e.message); }
    setBusy(false);
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/40 grid place-items-center p-4" onClick={close}>
      <div className="bg-white border border-purple-200 rounded-xl p-4 shadow-xl w-full max-w-md" onClick={e=>e.stopPropagation()}>
        <div className="text-sm font-semibold text-slate-800 mb-1">Reassign {row.student?.appNo}</div>
        <div className="text-[11px] text-slate-500 mb-3">Choose any date, room, and time. A new slot is created automatically if needed.</div>
        <label className="flex items-center gap-2 text-xs text-slate-600 mb-3">
          <input type="checkbox" checked={auto} onChange={e=>setAuto(e.target.checked)} /> Auto-pick next open slot
        </label>
        {!auto && (<>
          <label className="text-[11px] text-slate-600">Date</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="ev-input mb-2" />
          <label className="text-[11px] text-slate-600">Room</label>
          <input value={room} onChange={e=>setRoom(e.target.value)} placeholder="e.g. AB4-101 or Hall A" className="ev-input mb-2" />
          <div className="grid grid-cols-2 gap-2 mb-2">
            <div>
              <label className="text-[11px] text-slate-600">Start time</label>
              <input type="time" value={startTime} onChange={e=>{ setStartTime(e.target.value); if (!endTime) setEndTime(addMinutesToTimeInput(e.target.value, 10)); }} className="ev-input" />
            </div>
            <div>
              <label className="text-[11px] text-slate-600">End time</label>
              <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} className="ev-input" />
            </div>
          </div>
        </>)}
        <label className="text-[11px] text-slate-600">Remarks (optional)</label>
        <input value={remarks} onChange={e=>setRemarks(e.target.value)} placeholder="Reason / remarks" className="ev-input mb-2" />
        {err && <div className="text-[11px] text-red-700 mb-2 bg-red-50 border border-red-200 rounded p-2">{err}</div>}
        <div className="flex gap-2 justify-end">
          <button onClick={close} className="text-xs px-3 py-1.5 border border-slate-300 rounded">Cancel</button>
          <button onClick={submit} disabled={busy || (!auto && (!date || !room || !startTime))} className="text-xs px-3 py-1.5 bg-purple-600 text-white rounded disabled:opacity-50">{busy?"Saving…":"Confirm Reassign"}</button>
        </div>
      </div>
    </div>
  );
}

/* ====================== Export tab ====================== */
function ExportTab({ meta }) {
  const [date, setDate] = useState("");
  const [room, setRoom] = useState("");
  const [status, setStatus] = useState("");
  const download = () => {
    const p = new URLSearchParams();
    if (date)   p.set("date", date);
    if (room)   p.set("room", room);
    if (status) p.set("status", status);
    /* Use form-style direct-link download so the browser handles the filename. */
    const url = "/api/admin/verify/export.csv?" + p.toString();
    /* Add bearer via a temporary fetch+blob since auth is header-based. */
    fetch(url, { headers: { "Authorization": "Bearer " + auth.token } })
      .then(r => r.ok ? r.blob() : r.json().then(d => Promise.reject(new Error(d.error || ("HTTP " + r.status)))))
      .then(blob => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `verify-schedule${date?"-"+date:""}.csv`;
        document.body.appendChild(a); a.click();
        URL.revokeObjectURL(a.href); a.remove();
      })
      .catch(e => alert(e.message));
  };
  return (
    <div className="max-w-3xl space-y-4">
      <section className="bg-white border border-slate-200 rounded-2xl p-5">
        <h3 className="font-bold text-slate-800">Export to CSV</h3>
        <p className="text-xs text-slate-500 mt-1">Filtered to the values you pick below. Leave blank to export everything (excluding empty/open rows by default).</p>
        <div className="grid sm:grid-cols-3 gap-3 mt-3">
          <select value={date} onChange={e=>setDate(e.target.value)} className="ev-input">
            <option value="">All dates</option>
            {(meta?.dates || []).map(d => <option key={d} value={d}>{fmtDate(d)}</option>)}
          </select>
          <select value={room} onChange={e=>setRoom(e.target.value)} className="ev-input">
            <option value="">All rooms</option>
            {(meta?.rooms || []).map(r => <option key={r} value={r}>{r}</option>)}
          </select>
          <select value={status} onChange={e=>setStatus(e.target.value)} className="ev-input">
            <option value="">All statuses</option>
            {(meta?.statuses || []).filter(s=>s!=="open").map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <button onClick={download} className="mt-4 text-sm bg-indigo-600 text-white px-4 py-2 rounded-lg">⤓ Download CSV</button>
      </section>
      <section className="bg-white border border-slate-200 rounded-2xl p-5">
        <h3 className="font-bold text-slate-800">Excel</h3>
        <p className="text-xs text-slate-500 mt-1">Open the CSV in Excel — File → Open → choose the downloaded .csv. Excel auto-recognises the headers.</p>
      </section>
    </div>
  );
}

/* ====================== misc ====================== */
function Spinner({ label }) {
  return (
    <div className="grid place-items-center py-20 text-slate-500">
      <div className="w-8 h-8 border-4 border-slate-200 border-t-indigo-600 rounded-full spin"></div>
      <div className="mt-3 text-sm">{label || "Loading…"}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
