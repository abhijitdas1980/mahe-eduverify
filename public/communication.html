<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduVerify — Communication Center</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@500,700,800,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com/3.4.3"></script>
<style>
  body { font-family:'Satoshi',system-ui,sans-serif; background:#f8fafc; }
  .ev-input{width:100%;border:1px solid #cbd5e1;border-radius:.5rem;padding:.5rem .65rem;outline:none;font-size:.875rem}
  .ev-input:focus{box-shadow:0 0 0 3px rgba(79,70,229,.25)}
  .tab-on { background:#4338ca; color:#fff; }
  .tab-off { background:#fff; color:#475569; border:1px solid #e2e8f0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback, useMemo } = React;
const AUTH_KEY = "ev_auth";
const API = {
  token: null,
  async req(method, path, body, isForm) {
    const headers = {};
    if (API.token) headers.Authorization = "Bearer " + API.token;
    let payload;
    if (isForm) payload = body;
    else if (body !== undefined) { headers["Content-Type"] = "application/json"; payload = JSON.stringify(body); }
    const res = await fetch(path, { method, headers, body: payload });
    let data = {}; try { data = await res.json(); } catch (e) {}
    if (!res.ok) throw new Error(data.error || "Request failed (" + res.status + ")");
    return data;
  },
  get(p){ return API.req("GET", p); },
  post(p,b){ return API.req("POST", p, b); },
  patch(p,b){ return API.req("PATCH", p, b); },
  del(p){ return API.req("DELETE", p); },
  postForm(p,fd){ return API.req("POST", p, fd, true); },
  patchForm(p,fd){ return API.req("PATCH", p, fd, true); },
};
function loadAuth() {
  try {
    const a = JSON.parse(localStorage.getItem(AUTH_KEY) || "null");
    if (a?.token && a.role === "admin") { API.token = a.token; return a; }
  } catch (e) {}
  return null;
}
function fmtDate(v) {
  if (!v) return "—";
  return new Date(v).toLocaleString("en-IN", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
}
function urlParams() {
  const p = new URLSearchParams(window.location.search);
  const appRaw = p.get("appNo") || "";
  const appNos = appRaw ? appRaw.split(",").map(s => s.trim()).filter(Boolean) : [];
  return { appNo: appNos[0] || "", appNos, tab: p.get("tab") || "compose" };
}

function Field({ label, children }) {
  return (<div><label className="block text-xs font-semibold text-slate-600 mb-1">{label}</label>{children}</div>);
}

function LoginGate({ onAuth }) {
  const [staffId, setStaffId] = useState("");
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = async (e) => {
    e.preventDefault(); setBusy(true); setErr("");
    try {
      const r = await API.post("/api/auth/admin/login", { staffId, password: pwd });
      if (r.admin?.role !== "supervisor") throw new Error("Communication Center requires supervisor access.");
      const auth = { token: r.token, role: "admin", staffId: r.admin.staffId, adminRole: r.admin.role, name: r.admin.name };
      localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
      API.token = auth.token;
      onAuth(auth);
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  return (
    <div className="min-h-screen grid place-items-center p-4 bg-slate-100">
      <form onSubmit={submit} className="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border border-slate-200">
        <div className="text-xs text-indigo-600 font-semibold uppercase tracking-wider">MAHE EduVerify</div>
        <h1 className="text-2xl font-bold text-slate-900 mt-1">Communication Center</h1>
        <p className="text-sm text-slate-500 mt-2">Supervisor login required.</p>
        {err && <div className="mt-4 text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-3">{err}</div>}
        <div className="mt-5 space-y-3">
          <Field label="Staff ID"><input className="ev-input" value={staffId} onChange={e=>setStaffId(e.target.value)} required /></Field>
          <Field label="Password"><input type="password" className="ev-input" value={pwd} onChange={e=>setPwd(e.target.value)} required /></Field>
          <button disabled={busy} className="w-full bg-indigo-700 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-800 disabled:opacity-60">{busy?"Signing in…":"Sign in"}</button>
          <a href="/" className="block text-center text-sm text-slate-500 hover:text-indigo-700">← Back to EduVerify</a>
        </div>
      </form>
    </div>
  );
}

function ComposeTab({ meta, templates, initialAppNo, initialAppNos, initialTemplateId, onRefresh, onQueued, onCreateTemplate, onSaveAsTemplate }) {
  const [subject, setSubject] = useState("");
  const [bodyHtml, setBodyHtml] = useState("<p>Dear {{StudentName}},</p><p></p>{{ScheduleBlock}}");
  const [parentBodyHtml, setParentBodyHtml] = useState("");
  const [fromAddress, setFromAddress] = useState("");
  const [cc, setCc] = useState("");
  const [bcc, setBcc] = useState("");
  const [audience, setAudience] = useState("both");
  const [recipientMode, setRecipientMode] = useState((initialAppNos && initialAppNos.length) ? "selected" : "all");
  const [selectedAppNos, setSelectedAppNos] = useState(initialAppNos && initialAppNos.length ? initialAppNos : (initialAppNo ? [initialAppNo] : []));
  const [appNoInput, setAppNoInput] = useState(initialAppNo || "");
  const [filter, setFilter] = useState({});
  const [templateId, setTemplateId] = useState("");
  const [scheduleMode, setScheduleMode] = useState("now");
  const [scheduledAt, setScheduledAt] = useState("");
  const [files, setFiles] = useState([]);
  const [recipientCount, setRecipientCount] = useState(null);
  const [preview, setPreview] = useState(null);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [err, setErr] = useState("");
  const [previewAppNo, setPreviewAppNo] = useState(initialAppNo || "");

  useEffect(() => {
    if (meta?.fromDefault) setFromAddress(meta.fromDefault);
  }, [meta]);

  useEffect(() => {
    if (initialTemplateId) setTemplateId(String(initialTemplateId));
  }, [initialTemplateId]);

  useEffect(() => {
    const tpl = templates.find(t => String(t.id) === String(templateId));
    if (tpl) {
      setSubject(tpl.subject || "");
      setBodyHtml(tpl.bodyHtml || "");
      if (tpl.audience === "parent") setAudience("separate");
      else setAudience(tpl.audience || "both");
    }
  }, [templateId, templates]);

  const countRecipients = useCallback(async () => {
    try {
      const r = await API.post("/api/admin/communication/recipients/count", {
        recipientMode, recipientFilter: filter, selectedAppNos,
      });
      setRecipientCount(r);
    } catch (e) { setRecipientCount(null); }
  }, [recipientMode, filter, selectedAppNos]);

  useEffect(() => { countRecipients(); }, [countRecipients]);

  const addAppNo = () => {
    const v = appNoInput.trim();
    if (!v) return;
    if (!selectedAppNos.includes(v)) setSelectedAppNos([...selectedAppNos, v]);
    setAppNoInput("");
  };

  const buildForm = () => {
    const fd = new FormData();
    fd.append("subject", subject);
    fd.append("bodyHtml", bodyHtml);
    if (parentBodyHtml) fd.append("parentBodyHtml", parentBodyHtml);
    fd.append("fromAddress", fromAddress);
    if (cc) fd.append("cc", cc);
    if (bcc) fd.append("bcc", bcc);
    fd.append("audience", audience);
    fd.append("recipientMode", recipientMode);
    fd.append("recipientFilter", JSON.stringify(filter));
    fd.append("selectedAppNos", JSON.stringify(selectedAppNos));
    if (templateId) fd.append("templateId", templateId);
    if (scheduleMode !== "now" && scheduledAt) fd.append("scheduledAt", scheduledAt);
    files.forEach(f => fd.append("attachments", f));
    return fd;
  };

  const doPreview = async () => {
    const appNo = previewAppNo || selectedAppNos[0];
    if (!appNo) { setErr("Enter an application number for preview."); return; }
    setBusy(true); setErr("");
    try {
      const r = await API.post("/api/admin/communication/preview", {
        subject, bodyHtml, parentBodyHtml, appNo,
        recipientRole: audience === "parent" || audience === "separate" ? "parent" : "student",
      });
      setPreview(r);
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };

  const send = async (asDraft) => {
    setBusy(true); setErr(""); setMsg("");
    try {
      const fd = buildForm();
      if (asDraft) {
        await API.postForm("/api/admin/communication/messages/draft", fd);
        setMsg("Draft saved.");
      } else {
        const r = await API.postForm("/api/admin/communication/messages/send", fd);
        if (r.scheduled) {
          setMsg("Email scheduled. It will send automatically at the chosen time.");
        } else if (r.queued) {
          setMsg(`Sending started for ${r.recipientCount} student(s). Track delivery in the History tab — emails go out in the background.`);
          if (onQueued) onQueued();
        } else {
          setMsg(`Sent ${r.sent} email(s)${r.failed ? `, ${r.failed} failed` : ""}.`);
        }
      }
      onRefresh();
    } catch (ex) {
      setErr(ex.message || "Send failed. Check SMTP settings and try again.");
    } finally {
      setBusy(false);
    }
  };

  const wrapTag = (tag) => {
    const ta = document.getElementById("body-editor");
    if (!ta) return;
    const s = ta.selectionStart, e = ta.selectionEnd;
    const val = bodyHtml;
    setBodyHtml(val.slice(0,s) + `<${tag}>` + val.slice(s,e) + `</${tag}>` + val.slice(e));
  };

  const f = meta?.filters || {};

  return (
    <div className="grid lg:grid-cols-3 gap-6">
      <div className="lg:col-span-2 space-y-4">
        <div className="bg-white border border-slate-200 rounded-xl p-4 space-y-3">
          <div className="text-sm font-semibold text-slate-800">Compose Email</div>
          <div className="grid sm:grid-cols-2 gap-3">
            <Field label="From (Official MAHE email)"><input className="ev-input" value={fromAddress} onChange={e=>setFromAddress(e.target.value)} placeholder="MAHE Admissions &lt;admissions@...&gt;" /></Field>
            <Field label="Template">
              <div className="flex flex-wrap gap-2 items-center">
                <select className="ev-input flex-1 min-w-[160px]" value={templateId} onChange={e=>setTemplateId(e.target.value)}>
                  <option value="">— Select template —</option>
                  {templates.map(t=><option key={t.id} value={t.id}>{t.name}{t.isSystem ? " (system)" : ""}</option>)}
                </select>
                <button type="button" onClick={()=>onCreateTemplate && onCreateTemplate()} className="text-xs whitespace-nowrap border border-indigo-300 text-indigo-800 px-2 py-1.5 rounded-md hover:bg-indigo-50">+ New template</button>
                <button type="button" onClick={()=>onSaveAsTemplate && onSaveAsTemplate({ subject, bodyHtml, audience })} className="text-xs whitespace-nowrap border border-slate-300 text-slate-700 px-2 py-1.5 rounded-md hover:bg-slate-50">Save as template</button>
              </div>
            </Field>
            <Field label="CC"><input className="ev-input" value={cc} onChange={e=>setCc(e.target.value)} placeholder="optional" /></Field>
            <Field label="BCC"><input className="ev-input" value={bcc} onChange={e=>setBcc(e.target.value)} placeholder="optional" /></Field>
          </div>
          <Field label="Subject"><input className="ev-input" value={subject} onChange={e=>setSubject(e.target.value)} /></Field>
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className="text-xs font-semibold text-slate-600">Message (HTML supported)</label>
              <div className="flex gap-1">
                <button type="button" onClick={()=>wrapTag("b")} className="text-xs px-2 py-0.5 border rounded">B</button>
                <button type="button" onClick={()=>wrapTag("i")} className="text-xs px-2 py-0.5 border rounded">I</button>
                <button type="button" onClick={()=>setBodyHtml(bodyHtml + "<p></p>")} className="text-xs px-2 py-0.5 border rounded">¶</button>
              </div>
            </div>
            <textarea id="body-editor" rows={12} className="ev-input font-mono text-xs" value={bodyHtml} onChange={e=>setBodyHtml(e.target.value)} />
            <div className="text-[10px] text-slate-500 mt-1">Placeholders: {((meta?.placeholders)||[]).slice(0,8).join(", ")}…</div>
          </div>
          {audience === "separate" && (
            <Field label="Parent message (optional — separate content for parents)">
              <textarea rows={6} className="ev-input font-mono text-xs" value={parentBodyHtml} onChange={e=>setParentBodyHtml(e.target.value)} placeholder="Dear {{ParentName}}, … your ward {{StudentName}} …" />
            </Field>
          )}
          <Field label={"Attachments (PDF, images, DOCX, PPT, ZIP — max " + (meta?.settings?.maxAttachmentMb || 10) + " MB each)"}>
            <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.ppt,.pptx,.xlsx,.zip" onChange={e=>setFiles(Array.from(e.target.files||[]))} className="ev-input text-xs" />
            {files.length>0 && <div className="text-xs text-slate-500 mt-1">{files.map(f=>f.name).join(", ")}</div>}
          </Field>
        </div>
        {preview && (
          <div className="bg-white border border-slate-200 rounded-xl p-4">
            <div className="text-sm font-semibold mb-2">Preview — {preview.subject}</div>
            <div className="text-xs border rounded-lg p-3 max-h-64 overflow-y-auto prose prose-sm" dangerouslySetInnerHTML={{ __html: preview.html }} />
          </div>
        )}
        {err && <div className="text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-3">{err}</div>}
        {msg && <div className="text-sm text-green-800 bg-green-50 border border-green-200 rounded-lg p-3">{msg}</div>}
        <div className="flex flex-wrap gap-2">
          <button type="button" disabled={busy} onClick={doPreview} className="text-sm border border-indigo-300 text-indigo-900 px-4 py-2 rounded-lg hover:bg-indigo-50 disabled:opacity-60">Preview</button>
          <button type="button" disabled={busy} onClick={()=>send(true)} className="text-sm border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-50 disabled:opacity-60">Save Draft</button>
          <button type="button" disabled={busy} onClick={()=>send(false)} className="text-sm bg-indigo-700 text-white px-4 py-2 rounded-lg hover:bg-indigo-800 disabled:opacity-60">{busy?"Sending…":scheduleMode==="now"?"Send Now":"Schedule"}</button>
        </div>
      </div>

      <div className="space-y-4">
        <div className="bg-white border border-slate-200 rounded-xl p-4 space-y-3">
          <div className="text-sm font-semibold text-slate-800">Recipients</div>
          <Field label="Send to">
            <select className="ev-input" value={audience} onChange={e=>setAudience(e.target.value)}>
              <option value="both">Student + Parent</option>
              <option value="student">Student only</option>
              <option value="parent">Parent only</option>
              <option value="separate">Separate parent email</option>
            </select>
          </Field>
          <Field label="Selection mode">
            <select className="ev-input" value={recipientMode} onChange={e=>setRecipientMode(e.target.value)}>
              <option value="all">All students</option>
              <option value="selected">Selected students</option>
              <option value="filter">Filter</option>
            </select>
          </Field>
          {recipientMode === "selected" && (
            <div>
              <div className="flex gap-2">
                <input className="ev-input" value={appNoInput} onChange={e=>setAppNoInput(e.target.value)} placeholder="Application no." onKeyDown={e=>e.key==="Enter"&&(e.preventDefault(),addAppNo())} />
                <button type="button" onClick={addAppNo} className="text-xs bg-slate-100 px-3 rounded-lg border">Add</button>
              </div>
              <div className="flex flex-wrap gap-1 mt-2">{selectedAppNos.map(a=><span key={a} className="text-xs bg-indigo-100 text-indigo-900 px-2 py-0.5 rounded flex items-center gap-1">{a}<button type="button" onClick={()=>setSelectedAppNos(selectedAppNos.filter(x=>x!==a))} className="text-indigo-600">×</button></span>)}</div>
            </div>
          )}
          {recipientMode === "filter" && (
            <div className="grid gap-2 text-sm">
              <select className="ev-input" value={filter.program||""} onChange={e=>setFilter({...filter,program:e.target.value||undefined})}><option value="">All programs</option>{(f.programs||[]).map(p=><option key={p} value={p}>{p}</option>)}</select>
              <select className="ev-input" value={filter.department||""} onChange={e=>setFilter({...filter,department:e.target.value||undefined})}><option value="">All departments</option>{(f.departments||[]).map(p=><option key={p} value={p}>{p}</option>)}</select>
              <select className="ev-input" value={filter.batch||""} onChange={e=>setFilter({...filter,batch:e.target.value||undefined})}><option value="">All batches</option>{(f.batches||[]).map(p=><option key={p} value={p}>{p}</option>)}</select>
              <select className="ev-input" value={filter.verificationDate||""} onChange={e=>setFilter({...filter,verificationDate:e.target.value||undefined})}><option value="">All verification dates</option>{(f.verificationDates||[]).map(p=><option key={p} value={p}>{p}</option>)}</select>
              <select className="ev-input" value={filter.verificationRoom||""} onChange={e=>setFilter({...filter,verificationRoom:e.target.value||undefined})}><option value="">All rooms</option>{(f.verificationRooms||[]).map(p=><option key={p} value={p}>{p}</option>)}</select>
              <label className="flex items-center gap-2 text-xs"><input type="checkbox" checked={!!filter.pendingDocuments} onChange={e=>setFilter({...filter,pendingDocuments:e.target.checked||undefined})} /> Pending documents only</label>
              <label className="flex items-center gap-2 text-xs"><input type="checkbox" checked={!!filter.verifiedStudents} onChange={e=>setFilter({...filter,verifiedStudents:e.target.checked||undefined})} /> Verified students only</label>
              <input className="ev-input" placeholder="Search app no / name" value={filter.q||""} onChange={e=>setFilter({...filter,q:e.target.value||undefined})} />
            </div>
          )}
          {recipientCount && (
            <div className="text-xs bg-slate-50 border border-slate-200 rounded-lg p-3">
              <b>{recipientCount.count}</b> student(s) · {recipientCount.withStudentEmail} with student email · {recipientCount.withParentEmail} with parent email
            </div>
          )}
        </div>
        <div className="bg-white border border-slate-200 rounded-xl p-4 space-y-3">
          <div className="text-sm font-semibold text-slate-800">Schedule</div>
          <select className="ev-input" value={scheduleMode} onChange={e=>setScheduleMode(e.target.value)}>
            <option value="now">Send immediately</option>
            <option value="scheduled">Specific date & time</option>
          </select>
          {scheduleMode === "scheduled" && (
            <input type="datetime-local" className="ev-input" value={scheduledAt} onChange={e=>setScheduledAt(e.target.value ? new Date(e.target.value).toISOString() : "")} />
          )}
          <Field label="Preview as (app no)"><input className="ev-input" value={previewAppNo} onChange={e=>setPreviewAppNo(e.target.value)} /></Field>
        </div>
      </div>
    </div>
  );
}

function MessageList({ status, onOpen }) {
  const [rows, setRows] = useState([]);
  const [q, setQ] = useState("");
  const load = useCallback(async () => {
    const r = await API.get("/api/admin/communication/messages?status=" + encodeURIComponent(status||"") + "&q=" + encodeURIComponent(q));
    setRows(r.messages || []);
  }, [status, q]);
  useEffect(() => { load(); }, [load]);
  return (
    <div>
      <div className="flex gap-2 mb-4"><input className="ev-input max-w-xs" placeholder="Search subject…" value={q} onChange={e=>setQ(e.target.value)} /><button onClick={load} className="text-sm border px-3 rounded-lg">Search</button></div>
      <div className="bg-white border rounded-xl overflow-hidden">
        <table className="min-w-full text-sm">
          <thead className="bg-slate-50 text-xs uppercase text-slate-500"><tr><th className="text-left p-3">Subject</th><th className="text-left p-3">Status</th><th className="text-left p-3">By</th><th className="text-left p-3">Updated</th><th className="p-3"></th></tr></thead>
          <tbody>{rows.map(m=><tr key={m.id} className="border-t"><td className="p-3">{m.subject}</td><td className="p-3"><span className="text-xs font-semibold px-2 py-0.5 rounded bg-slate-100">{m.status}</span></td><td className="p-3 text-xs">{m.createdBy}</td><td className="p-3 text-xs">{fmtDate(m.updatedAt)}</td><td className="p-3">{m.status==="draft"&&<button onClick={()=>onOpen(m)} className="text-xs text-indigo-700">Open</button>}{m.status==="scheduled"&&<button onClick={async()=>{await API.post("/api/admin/communication/messages/"+m.id+"/send"); load();}} className="text-xs text-green-700 ml-2">Send now</button>}</td></tr>)}
          {!rows.length && <tr><td colSpan={5} className="p-8 text-center text-slate-500">No messages.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const TEMPLATE_CATEGORIES = [
  { id: "general", label: "General" },
  { id: "orientation", label: "Orientation" },
  { id: "verification", label: "Verification" },
  { id: "documents", label: "Documents" },
  { id: "reporting", label: "Reporting" },
  { id: "parent", label: "Parent" },
];

const DEFAULT_TEMPLATE_BODY = `<p>Dear {{StudentName}},</p>
<p></p>
{{ScheduleBlock}}
<p>Log in to EduVerify: <a href="{{PortalUrl}}">{{PortalUrl}}</a></p>
<p>Helpdesk: {{HelpDeskPhone}}</p>`;

function TemplateEditorModal({ open, mode, initial, placeholders, onClose, onSaved }) {
  const [form, setForm] = useState({ name:"", subject:"", bodyHtml:DEFAULT_TEMPLATE_BODY, category:"general", audience:"both" });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");

  useEffect(() => {
    if (!open) return;
    setErr(""); setOk("");
    if (initial) {
      setForm({
        name: initial.name || "",
        subject: initial.subject || "",
        bodyHtml: initial.bodyHtml || DEFAULT_TEMPLATE_BODY,
        category: initial.category || "general",
        audience: initial.audience || "both",
      });
    } else {
      setForm({ name:"", subject:"", bodyHtml:DEFAULT_TEMPLATE_BODY, category:"general", audience:"both" });
    }
  }, [open, initial]);

  if (!open) return null;

  const title = mode === "edit" ? "Edit template" : mode === "duplicate" ? "Duplicate template" : "Create new template";

  const save = async () => {
    if (!form.name.trim()) { setErr("Template name is required."); return; }
    if (!form.subject.trim()) { setErr("Subject is required."); return; }
    if (!form.bodyHtml.trim()) { setErr("Message body is required."); return; }
    setBusy(true); setErr(""); setOk("");
    try {
      if (mode === "edit" && initial?.id && !initial?.isSystem) {
        await API.patch("/api/admin/communication/templates/" + initial.id, form);
        setOk("Template updated.");
      } else {
        const payload = mode === "duplicate" && initial?.name
          ? { ...form, name: form.name.trim() || (initial.name + " (copy)") }
          : form;
        await API.post("/api/admin/communication/templates", payload);
        setOk(mode === "duplicate" ? "Template duplicated." : "Template created.");
      }
      onSaved && onSaved();
      setTimeout(() => onClose(), 600);
    } catch (ex) {
      setErr(ex.message || "Could not save template.");
    }
    setBusy(false);
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/40 grid place-items-center p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[92vh] overflow-hidden flex flex-col shadow-xl" onClick={e=>e.stopPropagation()}>
        <div className="p-5 border-b border-slate-200 flex items-start justify-between">
          <div>
            <div className="text-xs text-indigo-600 font-semibold uppercase tracking-wider">Email templates</div>
            <div className="font-bold text-slate-900 text-lg">{title}</div>
            <div className="text-xs text-slate-500 mt-1">Use placeholders like {"{{StudentName}}"}, {"{{VerificationDate}}"}, {"{{ScheduleBlock}}"}</div>
          </div>
          <button type="button" onClick={onClose} className="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
        </div>
        <div className="p-5 overflow-y-auto space-y-3">
          <Field label="Template name *"><input className="ev-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Orientation Invitation — Batch 1" /></Field>
          <div className="grid sm:grid-cols-2 gap-3">
            <Field label="Category">
              <select className="ev-input" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {TEMPLATE_CATEGORIES.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </Field>
            <Field label="Default audience">
              <select className="ev-input" value={form.audience} onChange={e=>setForm({...form,audience:e.target.value})}>
                <option value="both">Student + Parent</option>
                <option value="student">Student only</option>
                <option value="parent">Parent only</option>
              </select>
            </Field>
          </div>
          <Field label="Subject *"><input className="ev-input" value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})} placeholder="MAHE — Your orientation schedule (App {{ApplicationNo}})" /></Field>
          <Field label="Message body (HTML) *">
            <textarea rows={12} className="ev-input font-mono text-xs" value={form.bodyHtml} onChange={e=>setForm({...form,bodyHtml:e.target.value})} />
          </Field>
          {placeholders?.length > 0 && (
            <div className="text-[10px] text-slate-500 bg-slate-50 border border-slate-200 rounded-lg p-2">
              <b>Placeholders:</b> {placeholders.slice(0, 12).join(", ")}…
            </div>
          )}
          {err && <div className="text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-3">{err}</div>}
          {ok && <div className="text-sm text-green-800 bg-green-50 border border-green-200 rounded-lg p-3">{ok}</div>}
        </div>
        <div className="p-5 border-t border-slate-200 flex flex-wrap gap-2 justify-end">
          <button type="button" onClick={onClose} className="text-sm border border-slate-300 px-4 py-2 rounded-lg hover:bg-slate-50">Cancel</button>
          <button type="button" disabled={busy} onClick={save} className="text-sm bg-indigo-700 text-white px-4 py-2 rounded-lg hover:bg-indigo-800 disabled:opacity-60">{busy ? "Saving…" : "Save template"}</button>
        </div>
      </div>
    </div>
  );
}

function TemplatesTab({ templates, placeholders, onRefresh, onUseTemplate, onCreateNew }) {
  const [editor, setEditor] = useState(null);

  const openCreate = () => {
    if (onCreateNew) onCreateNew();
    else setEditor({ mode: "create", initial: null });
  };

  const openDuplicate = (t) => setEditor({
    mode: "duplicate",
    initial: {
      name: t.name + " (copy)",
      subject: t.subject,
      bodyHtml: t.bodyHtml,
      category: t.category,
      audience: t.audience,
      isSystem: t.isSystem,
    },
  });

  const openEdit = (t) => {
    if (t.isSystem) { openDuplicate(t); return; }
    setEditor({ mode: "edit", initial: t });
  };

  const remove = async (t) => {
    if (!window.confirm("Delete template \"" + t.name + "\"?")) return;
    try {
      await API.del("/api/admin/communication/templates/" + t.id);
      onRefresh();
    } catch (ex) {
      alert(ex.message);
    }
  };

  const custom = templates.filter(t => !t.isSystem);
  const system = templates.filter(t => t.isSystem);

  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div>
          <div className="font-semibold text-slate-900">Email templates</div>
          <div className="text-xs text-slate-500">Reusable messages with personalised placeholders for each student.</div>
        </div>
        <button type="button" onClick={openCreate} className="text-sm bg-indigo-700 text-white px-4 py-2 rounded-lg hover:bg-indigo-800 shadow-sm">+ Create new template</button>
      </div>

      <div className="grid lg:grid-cols-2 gap-6">
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Your templates ({custom.length})</div>
          {!custom.length && (
            <div className="text-sm text-slate-500 border border-dashed border-slate-300 rounded-lg p-6 text-center">
              No custom templates yet.<br />
              <button type="button" onClick={openCreate} className="mt-2 text-indigo-700 font-medium hover:underline">Create your first template</button>
            </div>
          )}
          <div className="divide-y">{custom.map(t=>(
            <div key={t.id} className="py-3 flex flex-wrap items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="font-medium text-sm text-slate-800">{t.name}</div>
                <div className="text-xs text-slate-500 truncate">{t.subject}</div>
                <div className="text-[10px] text-slate-400 mt-0.5">{t.category} · {t.audience}</div>
              </div>
              <div className="flex flex-wrap gap-1 shrink-0">
                <button type="button" onClick={()=>onUseTemplate && onUseTemplate(t)} className="text-xs bg-indigo-50 text-indigo-800 px-2 py-1 rounded border border-indigo-200">Use</button>
                <button type="button" onClick={()=>openEdit(t)} className="text-xs border px-2 py-1 rounded">Edit</button>
                <button type="button" onClick={()=>openDuplicate(t)} className="text-xs border px-2 py-1 rounded">Duplicate</button>
                <button type="button" onClick={()=>remove(t)} className="text-xs text-rose-700 border border-rose-200 px-2 py-1 rounded">Delete</button>
              </div>
            </div>
          ))}</div>
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">System templates ({system.length})</div>
          <div className="text-[11px] text-slate-500 mb-3">Built-in templates cannot be edited — duplicate to customise.</div>
          <div className="divide-y max-h-[520px] overflow-y-auto">{system.map(t=>(
            <div key={t.id} className="py-3 flex flex-wrap items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="font-medium text-sm">{t.name}</div>
                <div className="text-xs text-slate-500 truncate">{t.subject}</div>
              </div>
              <div className="flex flex-wrap gap-1 shrink-0">
                <button type="button" onClick={()=>onUseTemplate && onUseTemplate(t)} className="text-xs bg-indigo-50 text-indigo-800 px-2 py-1 rounded border border-indigo-200">Use</button>
                <button type="button" onClick={()=>openDuplicate(t)} className="text-xs border px-2 py-1 rounded">Duplicate</button>
              </div>
            </div>
          ))}</div>
        </div>
      </div>

      <TemplateEditorModal
        open={!!editor}
        mode={editor?.mode}
        initial={editor?.initial}
        placeholders={placeholders}
        onClose={()=>setEditor(null)}
        onSaved={onRefresh}
      />
    </div>
  );
}

function HistoryTab() {
  const [rows, setRows] = useState([]);
  const [q, setQ] = useState("");
  const [status, setStatus] = useState("");
  const load = useCallback(async () => {
    const r = await API.get("/api/admin/communication/deliveries?q="+encodeURIComponent(q)+"&status="+encodeURIComponent(status));
    setRows(r.deliveries||[]);
  }, [q, status]);
  useEffect(()=>{ load(); }, [load]);
  const statusCls = (s) => s==="sent"||s==="opened"?"bg-green-100 text-green-800":s==="failed"?"bg-rose-100 text-rose-800":"bg-slate-100";
  return (
    <div>
      <div className="flex flex-wrap gap-2 mb-4">
        <input className="ev-input max-w-xs" placeholder="Search email, name, subject…" value={q} onChange={e=>setQ(e.target.value)} />
        <select className="ev-input w-auto" value={status} onChange={e=>setStatus(e.target.value)}><option value="">All statuses</option><option value="sent">Sent</option><option value="opened">Opened</option><option value="failed">Failed</option><option value="pending">Pending</option></select>
        <button onClick={load} className="text-sm border px-3 rounded-lg">Search</button>
      </div>
      <div className="bg-white border rounded-xl overflow-x-auto">
        <table className="min-w-full text-sm">
          <thead className="bg-slate-50 text-xs uppercase text-slate-500"><tr><th className="text-left p-3">Date</th><th className="text-left p-3">Recipient</th><th className="text-left p-3">Role</th><th className="text-left p-3">Subject</th><th className="text-left p-3">Status</th><th className="text-left p-3">Sent by</th></tr></thead>
          <tbody>{rows.map(d=><tr key={d.id} className="border-t"><td className="p-3 text-xs whitespace-nowrap">{fmtDate(d.sentAt||d.createdAt)}</td><td className="p-3 text-xs">{d.recipientEmail}<div className="text-slate-400">{d.appNo}</div></td><td className="p-3 text-xs">{d.recipientRole}</td><td className="p-3 text-xs max-w-[200px] truncate">{d.subject}</td><td className="p-3"><span className={`text-xs font-semibold px-2 py-0.5 rounded ${statusCls(d.status)}`}>{d.status}{d.openedAt?" ✓":""}</span>{d.error&&<div className="text-[10px] text-rose-600">{d.error}</div>}</td><td className="p-3 text-xs">{d.sentBy||"—"}</td></tr>)}
          {!rows.length&&<tr><td colSpan={6} className="p-8 text-center text-slate-500">No delivery records yet.</td></tr>}</tbody>
        </table>
      </div>
    </div>
  );
}

function AnalyticsTab({ analytics }) {
  const a = analytics || {};
  const cards = [
    ["Total Sent", a.totalSent], ["Delivered", a.delivered], ["Opened", a.opened], ["Failed", a.failed],
    ["Open Rate", (a.openRate||0)+"%"], ["Drafts", a.drafts], ["Scheduled", a.scheduled],
  ];
  return (
    <div>
      <div className="grid sm:grid-cols-3 lg:grid-cols-4 gap-4">{cards.map(([l,v])=><div key={l} className="bg-white border rounded-xl p-4"><div className="text-xs text-slate-500 uppercase">{l}</div><div className="text-3xl font-bold text-slate-900 mt-1">{v??"—"}</div></div>)}</div>
      <p className="text-xs text-slate-500 mt-4">Opened status uses a tracking pixel when APP_URL or PORTAL_URL is configured. SMTP confirms sent/failed only; bounce webhooks are not available on basic Office 365 SMTP.</p>
    </div>
  );
}

function CommunicationApp({ auth }) {
  const init = urlParams();
  const [tab, setTab] = useState(init.tab);
  const [meta, setMeta] = useState(null);
  const [templates, setTemplates] = useState([]);
  const [pickTemplateId, setPickTemplateId] = useState("");
  const [templateEditor, setTemplateEditor] = useState(null);

  const load = useCallback(async () => {
    const [m, t] = await Promise.all([
      API.get("/api/admin/communication/meta"),
      API.get("/api/admin/communication/templates"),
    ]);
    setMeta(m);
    setTemplates(t.templates||[]);
  }, []);
  useEffect(()=>{ load(); }, [load]);

  const useTemplate = (t) => {
    setPickTemplateId(String(t.id));
    setTab("compose");
  };

  const openCreateTemplate = (initial) => {
    setTemplateEditor({ mode: "create", initial: initial || null });
  };

  const saveAsTemplate = (draft) => {
    setTemplateEditor({
      mode: "create",
      initial: {
        name: "",
        subject: draft.subject || "",
        bodyHtml: draft.bodyHtml || DEFAULT_TEMPLATE_BODY,
        category: "general",
        audience: draft.audience || "both",
      },
    });
  };

  const tabs = [
    ["compose","+ New Email"], ["drafts","Drafts"], ["templates","Templates"], ["scheduled","Scheduled"],
    ["sent","Sent"], ["failed","Failed"], ["history","History"], ["analytics","Analytics"],
  ];

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
          <div>
            <div className="text-[10px] font-semibold text-indigo-600 uppercase tracking-wider">Student & Parent Communication Hub</div>
            <h1 className="text-xl font-bold text-slate-900">Communication Center</h1>
          </div>
          <div className="flex items-center gap-3 text-sm">
            <span className="text-slate-500">{auth.name} · {auth.staffId}</span>
            <a href="/" className="text-indigo-700 hover:underline">← Verification Cell</a>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4 pb-3 flex flex-wrap gap-2">
          {tabs.map(([id,label])=><button key={id} onClick={()=>setTab(id)} className={`text-xs font-semibold px-3 py-1.5 rounded-lg ${tab===id?"tab-on":"tab-off"}`}>{label}</button>)}
        </div>
      </header>
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab==="compose" && <ComposeTab meta={meta} templates={templates} initialAppNo={init.appNo} initialAppNos={init.appNos} initialTemplateId={pickTemplateId} onRefresh={load} onQueued={()=>setTab("history")} onCreateTemplate={()=>openCreateTemplate()} onSaveAsTemplate={saveAsTemplate} />}
        {tab==="drafts" && <MessageList status="draft" onOpen={()=>setTab("compose")} />}
        {tab==="scheduled" && <MessageList status="scheduled" />}
        {tab==="sent" && <MessageList status="sent" />}
        {tab==="failed" && <MessageList status="failed" />}
        {tab==="templates" && <TemplatesTab templates={templates} placeholders={meta?.placeholders} onRefresh={load} onUseTemplate={useTemplate} onCreateNew={()=>openCreateTemplate()} />}
        {tab==="history" && <HistoryTab />}
        {tab==="analytics" && <AnalyticsTab analytics={meta?.analytics} />}
      </main>
      <TemplateEditorModal
        open={!!templateEditor}
        mode={templateEditor?.mode}
        initial={templateEditor?.initial}
        placeholders={meta?.placeholders}
        onClose={()=>setTemplateEditor(null)}
        onSaved={load}
      />
    </div>
  );
}

function App() {
  const [auth, setAuth] = useState(() => loadAuth());
  if (!auth || auth.adminRole !== "supervisor") return <LoginGate onAuth={setAuth} />;
  return <CommunicationApp auth={auth} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
