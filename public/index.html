/* ============================================================ API ============================================================ */
const API = {
  token: null,
  async req(method, path, body, isForm) {
    const headers = {};
    if (API.token) headers["Authorization"] = "Bearer " + API.token;
    let payload;
    if (isForm) payload = body;
    else if (body !== undefined) { headers["Content-Type"] = "application/json"; payload = JSON.stringify(body); }
    const res = await fetch(path, { method, headers, body: payload });
    let data = {}; try { data = await res.json(); } catch (e) {}
    if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
    return data;
  },
  get(p){return API.req("GET",p);}, post(p,b){return API.req("POST",p,b);},
  patch(p,b){return API.req("PATCH",p,b);}, del(p){return API.req("DELETE",p);},
  upload(p,file){const fd=new FormData(); fd.append("file",file); return API.req("POST",p,fd,true);},
  async blob(path){const headers={};if(API.token)headers["Authorization"]="Bearer "+API.token;const res=await fetch(path,{headers});if(!res.ok){let d={};try{d=await res.json();}catch(e){}throw new Error(d.error||("Download failed ("+res.status+")"));}return res.blob();},
};

const AUTH_KEY = "ev_auth";
function loadAuth() { try { const a = JSON.parse(localStorage.getItem(AUTH_KEY) || "null"); if (a && a.token) { API.token = a.token; return a; } } catch (e) {} return null; }

const lightColor = (s) => s==="ready"||s==="verified" ? "bg-green-500" : s==="pending" ? "bg-yellow-400" : s==="issue"||s==="rejected" ? "bg-red-500" : "bg-slate-300";

const staffDocStatusLabel = (doc) => doc.staffStatus==="verified" ? "Accepted by staff" : doc.staffStatus==="rejected" ? "Rejected — re-upload required" : doc.hasFile ? "Awaiting staff review" : "Not uploaded";
const staffDocStatusCls = (doc) => doc.staffStatus==="verified" ? "bg-green-100 text-green-700" : doc.staffStatus==="rejected" ? "bg-rose-100 text-rose-700" : doc.hasFile ? "bg-amber-100 text-amber-800" : "bg-slate-100 text-slate-500";

};

  (documents || []).some((d) => !d.optional && d.staffStatus === "rejected")
);

);
const parseTimeLabel = (label) => {
  const s = String(label || "").trim();
  const m12 = s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (m12) {
    let h = parseInt(m12[1], 10);
    const mm = parseInt(m12[2], 10);
    const ap = m12[3].toUpperCase();
    if (ap === "PM" && h !== 12) h += 12;
    if (ap === "AM" && h === 12) h = 0;
    return h * 60 + mm;
  }
  const m24 = s.match(/^(\d{1,2}):(\d{2})$/);
  if (m24) return parseInt(m24[1], 10) * 60 + parseInt(m24[2], 10);
  return null;
};
const labelToTimeInput = (label) => {
  const mins = parseTimeLabel(label);
  if (mins == null) return "";
  const h = Math.floor(mins / 60);
  const mm = String(mins % 60).padStart(2, "0");
  return `${String(h).padStart(2, "0")}:${mm}`;
};
const addMinutesToTimeInput = (val, minutes) => {
  const mins = parseTimeLabel(val);
  if (mins == null) return "";
  const total = mins + minutes;
  const h = Math.floor(total / 60) % 24;
  const mm = String(total % 60).padStart(2, "0");
  return `${String(h).padStart(2, "0")}:${mm}`;
};
const minsToTimeLabel = (totalMins) => {
  const m = ((totalMins % (24 * 60)) + (24 * 60)) % (24 * 60);
  const h24 = Math.floor(m / 60);
  const mm = String(m % 60).padStart(2, "0");
  const ap = h24 < 12 ? "AM" : "PM";
  const h12 = (h24 % 12) === 0 ? 12 : (h24 % 12);
  return `${h12}:${mm} ${ap}`;
};
const reportingTime = (startTime, minutesBefore = 30) => {
  const mins = parseTimeLabel(startTime);
  if (mins == null) return startTime || "—";
  return minsToTimeLabel(mins - minutesBefore);
};

const downloadText = (filename, text) => { const blob = new Blob([text], { type:"text/plain" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); };
const downloadBlob = (filename, blob) => { const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); };

/** v7 — download static PDF or render text template via jsPDF. */
function downloadTemplatePdf(template) {
  if (template.pdfFile) {
    const a = document.createElement("a");
    a.href = template.pdfFile;
    a.download = template.downloadName || template.pdfFile.split("/").pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    return;
  }
  if (!window.jspdf) { downloadText(`${template.key}-template.txt`, template.content); return; }
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "pt", format: "a4" });
  pdf.setFont("courier", "normal"); pdf.setFontSize(10);
  const margin = 40, maxWidth = 515, pageHeight = 800;
  const lines = pdf.splitTextToSize(template.content, maxWidth);
  let y = margin;
  for (const line of lines) {
    if (y > pageHeight) { pdf.addPage(); y = margin; }
    pdf.text(line, margin, y);
    y += 14;
  }
  pdf.save(`${template.key}-template.pdf`);
}

/* v28 — minimal toast system. window.evToast(kind, message). */
const toastQueue = [];
const toastListeners = new Set();
/* v30 — evToast(kind, message, options?) — options may include
   { undo: async () => void, undoLabel?: string, duration?: number }.
   When `undo` is provided the toast renders an Undo button and stays
   visible 8 seconds (vs 4.2 s for plain toasts). */
function evToast(kind, message, options) {
  const id = Date.now() + Math.random();
  const hasUndo = options && typeof options.undo === "function";
  const duration = (options && options.duration) || (hasUndo ? 8000 : 4200);
  const entry = {
    id, kind, message,
    undo: hasUndo ? options.undo : null,
    undoLabel: (options && options.undoLabel) || "Undo",
  };
  /* expose dismiss so the action button can clear the toast immediately */
  entry.dismiss = () => {
    if (entry._cleared) return;
    entry._cleared = true;
    clearTimeout(entry._t);
    const i = toastQueue.findIndex(t => t.id === id);
    if (i >= 0) toastQueue.splice(i, 1);
    toastListeners.forEach(l => l([...toastQueue]));
  };
  toastQueue.push(entry);
  toastListeners.forEach(l => l([...toastQueue]));
  entry._t = setTimeout(entry.dismiss, duration);
}
if (typeof window !== "undefined") window.evToast = evToast;
function ToastRegion() {
  const [queue, setQueue] = useState([]);
  useEffect(() => { toastListeners.add(setQueue); return () => toastListeners.delete(setQueue); }, []);
  /* v30 — keyboard shortcut: Ctrl/Cmd+Z fires the most recent toast's undo
     (unless focus is in an editable field, where the browser's own undo wins). */
  useEffect(() => {
    const onKey = (e) => {
      if (!((e.metaKey || e.ctrlKey) && e.key && e.key.toLowerCase() === "z") || e.shiftKey) return;
      const ae = document.activeElement;
      const editable = ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable);
      if (editable) return;
      const undoable = [...toastQueue].reverse().find(t => t.undo);
      if (undoable) {
        e.preventDefault();
        try { undoable.undo(); } catch (err) {}
        undoable.dismiss && undoable.dismiss();
      }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  return (<div className="toast-region" role="status" aria-live="polite" aria-atomic="false">
    {queue.map(t => (
      <div key={t.id} className={`toast toast-${t.kind || "info"} flex items-center gap-3`}>
        <span className="flex-1">{t.message}</span>
        {t.undo && (
          <button
            type="button"
            onClick={() => { try { t.undo(); } catch (e) {} t.dismiss && t.dismiss(); }}
            className="text-xs font-semibold text-crimson-deep hover:text-crimson-dark px-2.5 py-1 rounded border border-crimson/30 hover:bg-[#fdf5f4] dark:hover:bg-[#281412]"
            aria-label={`${t.undoLabel} — Ctrl+Z`}
            title="Ctrl+Z">
            ↶ {t.undoLabel}
          </button>
        )}
        <button
          type="button"
          onClick={() => t.dismiss && t.dismiss()}
          className="text-slate-400 hover:text-slate-700 text-lg leading-none"
          aria-label="Dismiss notification">×</button>
      </div>
    ))}
  </div>);
}

/* v29 — modal focus trap hook.
   Apply trapRef to the modal's outer container, call useFocusTrap(true, close).
   - Initial focus moves to the first focusable element (skipping the × button).
   - Tab / Shift+Tab cycle inside the modal.
   - Escape calls the onEscape callback.
   - Background nodes outside the modal are marked aria-hidden + inert.
   - Focus restores to the previously-focused element on close. */
function useFocusTrap(active, onEscape) {
  const ref = useRef(null);
  useEffect(() => {
    if (!active) return undefined;
    const node = ref.current;
    if (!node) return undefined;
    const prev = (typeof document !== "undefined") ? document.activeElement : null;
    const SELECTOR = [
      'a[href]','area[href]','button:not([disabled])','textarea:not([disabled])',
      'input:not([disabled]):not([type="hidden"])','select:not([disabled])',
      'iframe','[tabindex]:not([tabindex="-1"])','[contenteditable="true"]'
    ].join(',');
    const isVisible = (el) => !!(el.offsetWidth || el.offsetHeight || el.getClientRects().length);
    const getFocusables = () => Array.from(node.querySelectorAll(SELECTOR)).filter(isVisible);
    /* Initial focus — skip the × close button so the user lands somewhere meaningful. */
    const initial = getFocusables();
    const meaningful = initial.find((el) => !/^[\u00D7\u2715xX]$/.test((el.textContent || "").trim())) || initial[0] || node;
    const initId = setTimeout(() => { try { meaningful.focus(); } catch (e) {} }, 0);
    const onKey = (e) => {
      if (e.key === "Escape" && typeof onEscape === "function") {
        e.preventDefault(); onEscape(); return;
      }
      if (e.key !== "Tab") return;
      const items = getFocusables();
      if (!items.length) { e.preventDefault(); return; }
      const first = items[0], last = items[items.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      else if (!node.contains(document.activeElement)) { e.preventDefault(); first.focus(); }
    };
    document.addEventListener("keydown", onKey);
    /* Make background inert. Modal sits inside #root, so we mark every direct
       child of #root that doesn't contain the modal. */
    const root = document.getElementById("root");
    const targets = root
      ? Array.from(root.children).filter((c) => c !== node && !c.contains(node))
      : [];
    targets.forEach((el) => {
      if (!el.hasAttribute("aria-hidden")) el.dataset.evHidWasAbsent = "1";
      el.setAttribute("aria-hidden", "true");
      try { el.inert = true; } catch (e) {}
    });
    return () => {
      clearTimeout(initId);
      document.removeEventListener("keydown", onKey);
      targets.forEach((el) => {
        if (el.dataset.evHidWasAbsent === "1") { el.removeAttribute("aria-hidden"); delete el.dataset.evHidWasAbsent; }
        try { el.inert = false; } catch (e) {}
      });
      if (prev && typeof prev.focus === "function") {
        setTimeout(() => { try { prev.focus(); } catch (e) {} }, 0);
      }
    };
  }, [active, onEscape]);
  return ref;
}

function useEvTheme() {
  useEffect(() => {
    let t = null;
    try { t = localStorage.getItem("theme"); } catch (e) {}
    if (!t) t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    document.documentElement.classList.toggle("dark", t === "dark");
    const tryIcons = (n) => {
      if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
      else if (n < 50) setTimeout(() => tryIcons(n + 1), 100);
    };
    tryIcons(0);
  }, []);
}

function useLandingEffects() {
  useEvTheme();
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    let io;
    if ("IntersectionObserver" in window) {
      io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("reveal-in"); io.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
      els.forEach((el) => io.observe(el));
    } else {
      els.forEach((el) => el.classList.add("reveal-in"));
    }
    return () => { if (io) io.disconnect(); };
  }, []);
}

  else if (screen==="checklist") body = <SChecklist data={data} reload={reload} go={go} openTemplates={()=>setShowTemplates(true)} />;

  else if (screen==="slot")      body = USE_REPORTING_SLOTS ? <SReportingSlot data={data} reload={reload} go={go} /> : <SSlot data={data} reload={reload} go={go} />;
  else if (screen==="summary")   body = <SSummary data={data} go={go} />;
  else if (screen==="faq")       body = <SFaq go={go} />;
  return (<PortalShell subtitle="Student Portal" right={right} extra={showTemplates && data?.student?.contactCompleted && <TemplatesModal close={()=>setShowTemplates(false)} />}>{body}</PortalShell>);
}

      <div className="grid sm:grid-cols-2 gap-3">

        <Field label="Mobile *"><input type="tel" required disabled={readOnly} value={form.parentPhone} onChange={e=>set("parentPhone",e.target.value)} className="ev-input" placeholder="10-digit mobile" /></Field>
      </div>
      {!readOnly && (<label className="flex items-start gap-2 p-3 bg-slate-50 rounded-lg border border-slate-200 cursor-pointer"><input type="checkbox" className="mt-1 w-4 h-4 accent-crimson" checked={agree} onChange={e=>setAgree(e.target.checked)} /><span className="text-sm text-slate-800">I confirm that the contact details above are correct and may be used by the institution for admission-related communication.</span></label>)}

        {go && student.contactCompleted && (<button type="button" onClick={()=>go("dashboard")} className="px-4 py-2.5 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">{readOnly ? "← Back to Dashboard" : "← Back to Dashboard"}</button>)}
      </div>

/* v8 — gating uses MANDATORY docs only. Optional docs (MIGRATION) are
   reported separately and don't block declaration or slot booking. */
function docStats(documents) {
  const mand = documents.filter(d => !d.optional);
  const opt  = documents.filter(d =>  d.optional);
  const total   = mand.length;
  const ready   = mand.filter(d=>d.studentStatus==="ready").length;
  const issue   = mand.filter(d=>d.studentStatus==="issue").length;
  const pending = mand.filter(d=>d.studentStatus==="pending").length;
  const flagged = documents.filter(d=>d.flagged).length;
  const optTotal    = opt.length;
  const optUploaded = opt.filter(d=>d.hasFile).length;
  const optReady    = opt.filter(d=>d.studentStatus==="ready").length;
  return { total, ready, issue, pending, flagged, optTotal, optUploaded, optReady, allReady: total>0 && ready===total };
}

function StageNav({ steps }) {
  return (<div className="flex items-center gap-2 flex-wrap text-sm">{steps.map((s, i) => (<React.Fragment key={i}>{i > 0 && <span className="text-slate-300">›</span>}{s.onClick ? <button onClick={s.onClick} className={`hover:underline ${s.active?'text-crimson-deep font-semibold':'text-slate-600'}`}>{s.label}</button> : <span className={s.active?'text-crimson-deep font-semibold':'text-slate-500'}>{s.label}</span>}</React.Fragment>))}</div>);
}

2xl border border-slate-200"><div className="text-xs text-slate-500">Document Readiness</div><div className="mt-1 text-3xl font-bold text-slate-800">{pct}%</div><div className="w-full bg-slate-100 rounded-full h-2 mt-2 overflow-hidden"><div className={`h-2 ${pct===100?'bg-green-500':pct>0?'bg-yellow-400':'bg-slate-300'}`} style={{width:`${pct}%`}}></div></div><div className="mt-3 flex items-center text-xs gap-3 flex-wrap"><span><span className={`traffic-light ${lightColor("ready")}`}></span>{st.ready} ready</span><span><span className={`traffic-light ${lightColor("pending")}`}></span>{st.pending} pending</span><span><span className={`traffic-light ${lightColor("issue")}`}></span>{st.issue} issue</span>{st.flagged>0 && <span className="text-rose-700">⚑ {st.flagged} flagged</span>}</div></div></div><VerifySlotPanel student={student} verifySlot={data.verifySlot} /><div className="bg-white border border-slate-200 rounded-2xl p-5 mt-5"><div className="grid sm:grid-cols-3 gap-4"><StepCard n="1" t="Document Checklist" d={`${st.ready}/${st.total} mandatory ready${st.optTotal>0 ? ` · ${st.optUploaded}/${st.optTotal} optional uploaded` : ""}`} done={st.allReady} cta="Open Checklist" onClick={()=>go("checklist")} /><StepCard n="2" t="Verification Slot (auto-allocated)" d={data.verifySlot ? `${data.verifySlot.room} · slot #${data.verifySlot.slotNo} · ${data.verifySlot.startTime}` : (student.declared && st.allReady ? "No slot available — contact verification cell" : (st.allReady ? "Sign self-declaration to get your slot" : "Waiting for mandatory docs to be confirmed"))} done={!!data.verifySlot} cta={data.verifySlot ? "View Slot" : (st.allReady ? "Sign Declaration" : "Open Checklist")} onClick={()=>go(data.verifySlot ? "slot" : (st.allReady ? "declare" : "checklist"))} disabled={false} /><StepCard n="3" t="Original Document Verification" d={data.verifySlot ? (data.verifySlot.status==="verified" ? "Verified at campus" : "Report on assigned day/time") : "After slot allocation"} done={data.verifySlot && data.verifySlot.status==="verified"} cta="View Verification" onClick={()=>go("summary")} disabled={!data.verifySlot} hint="Slot is assigned after you sign the self-declaration" /></div></div><div className="mt-5 grid md:grid-cols-3 gap-5"><div className="md:col-span-2 bg-amber-50 border border-amber-200 rounded-2xl p-5 text-sm text-amber-800"><div className="font-semibold text-amber-900">Tip — finish in one sitting (~15 mins)</div>Keep your documents ready as PDFs or JPGs under 6 MB. For marks cards and certificates also enter the issuing board / university so we can pre-verify it.<div className="mt-2 flex flex-wrap gap-2"><button onClick={openTemplates} className="text-amber-900 underline">📄 Download Standard Templates</button><span className="text-amber-700">·</span><button onClick={()=>go("faq")} className="text-amber-900 underline">Read the FAQ</button></div></div><SupportCard /></div></div>);

/* v7 PHOTOS validation: enforce image-only + dimension/size pre-check on frontend. */
const PHOTO_MIMES = new Set(["image/jpeg", "image/png", "image/jpg", "image/pjpeg", "image/x-png"]);
const PHOTO_EXTS = new Set(["jpg", "jpeg", "jfif", "png"]);

function probePhotoDimensions(f) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = () => resolve(null);
      img.src = reader.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(f);
  });
}

async function validatePhotoFile(f) {
  const ext = (f.name || "").split(".").pop().toLowerCase();
  if (["heic", "heif"].includes(ext)) {
    return "iPhone HEIC photos are not supported. Open the photo, save/export as JPG, then upload.";
  }
  const mime = (f.type || "").toLowerCase().split(";")[0].trim();
  const okType = PHOTO_MIMES.has(mime) || PHOTO_EXTS.has(ext);
  if (!okType) {
    return "Photographs must be JPG or PNG only — PDFs, HEIC, and other formats are not accepted.";
  }
  if (f.size > 6 * 1024 * 1024) return "Photograph file is too large (max 6 MB).";
  const dims = await probePhotoDimensions(f);
  if (!dims) {
    /* If the browser cannot preview the image, still allow upload — server validates type. */
    return null;
  }
  const { w, h } = dims;
  if (w < 120 || h < 120) {
    return `Photograph is too small (${w}×${h} px). Use a clear passport-size JPG/PNG (at least 120×120 px).`;
  }
  if (w > 12000 || h > 12000) {
    return `Photograph is too large (${w}×${h} px). Try saving at a lower resolution.`;
  }
  return null;
}

    {tab==="verify" && (<div>{/* v9 — Document Status block */}<div className="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm space-y-1"><div className="font-semibold text-slate-800">Document Status</div><div className="flex items-center gap-2 text-slate-700"><span className={doc.hasFile?"text-green-600":"text-slate-400"}>{doc.hasFile?"✓":"○"}</span> Uploaded {doc.hasFile ? "Successfully" : "— pending"}</div><div className="flex items-center gap-2 text-slate-700"><span className={doc.hasFile?"text-green-600":"text-slate-400"}>{doc.hasFile?"✓":"○"}</span> Preview {doc.hasFile ? "Available" : "— upload first"}{doc.hasFile && <button onClick={()=>setPreview(true)} className="ml-1 text-xs text-crimson hover:underline">view</button>}</div><div className="flex items-center gap-2 text-slate-700"><span className="text-green-600">✓</span> {doc.optional ? "Optional Document" : "Mandatory Document"}</div></div>{needsInst && (<div className="mt-4"><label className="text-xs font-medium text-slate-600">Issuing institution / board <MandStar/></label><input value={institution} onChange={e=>setInstitution(e.target.value)} onBlur={saveInstitution} placeholder="e.g. Karnataka Secondary Education Examination Board" className="ev-input mt-1" /><div className="text-[11px] text-slate-500 mt-1">The system auto-checks this against a list of non-recognised institutions.</div></div>)}{/* v9 — Single confirmation checkbox */}<label className="mt-4 flex items-start gap-2 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer"><input type="checkbox" disabled={isReady||isVerified} checked={confirmed} onChange={e=>setConfirmed(e.target.checked)} className="mt-1 w-4 h-4 accent-crimson" /><span className="text-sm text-slate-800"><b>Student Confirmation.</b> {CONFIRM_QUESTION}</span></label>{/* v9 — Information note */}<div className="mt-3 bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-900"><div className="font-semibold">Information note — please ensure:</div><ul className="list-disc list-inside mt-1 space-y-0.5">{CONFIRM_NOTE_LINES.map((l,i)=><li key={i}>{l}</li>)}</ul></div><ErrorNote msg={err} /><div className="mt-4 flex flex-wrap gap-2 items-center">{isVerified ? (<span className="text-sm font-semibold bg-green-100 text-green-700 px-3 py-1.5 rounded-md">✓ Accepted by the verification cell</span>) : isReady ? (<span className="text-sm font-semibold bg-green-100 text-green-700 px-3 py-1.5 rounded-md">✓ Uploaded · ✓ Verified by Student — awaiting staff acceptance</span>) : (<><button disabled={!doc.hasFile||!confirmed||busy||(needsInst&&!institution.trim())} onClick={confirmAndSave} className={`px-4 py-2 rounded-lg font-semibold ${(!doc.hasFile||!confirmed||busy||(needsInst&&!institution.trim()))?'bg-slate-200 text-slate-400 cursor-not-allowed':'bg-green-600 text-white hover:bg-green-700'}`}>{busy?"Saving…":"✓ Confirm & Save Document"}</button>{!doc.hasFile && <span className="text-xs text-slate-500">Upload the file first.</span>}{doc.hasFile && !confirmed && <span className="text-xs text-slate-500">Tick the confirmation to enable saving.</span>}</>)}</div></div>)}

function SDeclaration({ data, reload, go }) {
  const { student, documents } = data;
  const st = docStats(documents);
  const pendingMand = documents.filter(d => !d.optional && d.studentStatus !== "ready");
  const declarationLocked = isDeclarationLocked(student, documents);
  const staffRejected = hasStaffRejectedMandatory(documents);
  const [agree, setAgree] = useState(declarationLocked);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async () => {
    if (declarationLocked) return;
    if (!st.allReady) { setErr("Upload and confirm every mandatory document first."); return; }
    setBusy(true); setErr("");
    try {
      const r = await API.post("/api/student/declare");
      await reload();
      if (r.allocation?.allocated === false && r.allocation?.reason === "no-slots-available") {
        window.evToast && window.evToast("warning", "Declaration saved, but no verification slots are left on your assigned date. Please contact the verification cell.");
      } else if (r.allocation?.allocated) {
        window.evToast && window.evToast("success", "Verification slot allocated — check your dashboard.");
      }
      go(USE_REPORTING_SLOTS ? "slot" : "dashboard");
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  return (<div className="max-w-3xl mx-auto px-4 sm:px-6 py-8 fade-in">
    <StageNav steps={[{label:"Dashboard",onClick:()=>go("dashboard")},{label:"Document Checklist",onClick:()=>go("checklist")},{label:"Self-Declaration",active:true},...(USE_REPORTING_SLOTS?[{label:"Slot Booking"}]:[])]} />
    <h2 className="text-2xl font-bold text-slate-800 mt-3">Self-Declaration{declarationLocked ? " — signed" : ""}</h2>
    {staffRejected && !student.declared && (<div className="mt-3 text-sm bg-rose-50 border border-rose-200 text-rose-800 rounded-lg p-3">A mandatory document was <b>rejected by staff</b>. Correct the document(s) in your checklist, then sign the declaration again.</div>)}
    {!st.allReady && !declarationLocked && (<div className="mt-3 bg-amber-50 border border-amber-300 rounded-2xl p-4 text-sm text-amber-900"><div className="font-semibold">Self Declaration is locked.</div><div className="mt-1">Please complete the following mandatory documents first:</div><ul className="list-disc list-inside mt-1">{pendingMand.map(d=><li key={d.docCode}>{d.name} — {lightLabel(d.studentStatus)}</li>)}</ul><button onClick={()=>go("checklist")} className="mt-2 text-sm bg-amber-600 text-white px-3 py-1.5 rounded-md hover:bg-amber-700">Open Document Checklist →</button></div>)}
    {declarationLocked && (<div className="mt-3 text-sm bg-green-50 border border-green-200 text-green-800 rounded-lg p-3">🔒 <b>Locked after signing.</b> Your self-declaration was recorded{student.declaredAt ? <> on <b>{new Date(student.declaredAt).toLocaleString()}</b></> : null}. It can only be changed if staff reject a mandatory document.</div>)}

function contactPill(r) {
  if (!r.contactCompleted) return { label: "Contact missing", cls: "bg-rose-100 text-rose-800" };
  if (!r.contactVerified) return { label: "Awaiting campus check", cls: "bg-amber-100 text-amber-800" };
  return { label: "Contact verified", cls: "bg-green-100 text-green-700" };
}
function pipelineStatus(r) {
  if (r.flagged > 0) return "Flagged";
  if (r.verifyStatus === "verified")   return "Verified";
  if (r.verifyStatus === "absent")     return "Absent";
  if (r.verifyStatus === "reassigned") return "Reassigned";
  if (r.verifyStatus === "booked" || r.verifyStatus === "pending") return "Slot Assigned";
  if (r.issues > 0) return "Needs Attention";
  if (r.ready === r.total && r.total > 0) return "Docs Ready";
  return "In Progress";
}
function statusPill(label) {
  const map = {
    "Flagged":         "bg-rose-100 text-rose-800 border border-rose-300",
    "Verified":        "bg-green-100 text-green-700",
    "Absent":          "bg-rose-100 text-rose-700",
    "Reassigned":      "bg-purple-100 text-purple-700",
    "Slot Assigned":   "bg-blue-100 text-blue-700",
    "Needs Attention": "bg-amber-100 text-amber-800",
    "Docs Ready":      "bg-emerald-100 text-emerald-700",
    "In Progress":     "bg-slate-100 text-slate-600",
  };
  return map[label] || "bg-slate-100 text-slate-600";
}

arkBusy?"Saving…":"Save Follow-up Note"}</button><OkNote msg={remarkOk} /></div>{(detail.followupRemarks || []).length > 0 && (<div className="mt-4 border-t border-slate-200 pt-3"><div className="text-xs font-semibold text-slate-700 mb-2">Remark history ({detail.followupRemarks.length})</div><div className="space-y-2 max-h-48 overflow-y-auto">{detail.followupRemarks.map(r => (<div key={r.id} className="text-xs bg-white border border-slate-200 rounded-lg p-3"><div className="flex items-center justify-between gap-2 text-[10px] text-slate-500"><span>{new Date(r.createdAt).toLocaleString()}</span><span>{r.adminStaffId ? `${r.adminStaffId}${r.adminName ? ` (${r.adminName})` : ""}` : "Staff"}</span></div>{r.physicalSubmissionNote && <div className="mt-1"><b>Physical:</b> {r.physicalSubmissionNote}</div>}{r.discrepancies && <div className="mt-1"><b>Discrepancies:</b> {r.discrepancies}</div>}{r.discussionNotes && <div className="mt-1"><b>Discussion:</b> {r.discussionNotes}</div>}{r.expectedSubmissionDate && <div className="mt-1"><b>Expected by:</b> {fmtDate(r.expectedSubmissionDate)}</div>}{r.remarks && <div className="mt-1"><b>Remarks:</b> {r.remarks}</div>}</div>))}</div></div>)}</div><div className="font-semibold text-slate-800 mt-5 mb-2">Pending Items &amp; Deadline (student-visible)</div><div className="border border-slate-200 rounded-lg p-3"><Field label="Pending documents / notes (visible to the student)"><textarea value={pendingDocs} onChange={e=>setPendingDocs(e.target.value)} rows="2" placeholder="e.g. Original 12th marks card; signed Anti-Substance Abuse declaration" className="ev-input" /></Field><div className="grid sm:grid-cols-3 gap-3 mt-3 items-end"><Field label="Submission deadline"><input type="date" value={pendingDeadline} onChange={e=>setPendingDeadline(e.target.value)} className="ev-input" /></Field><div className="sm:col-span-2 flex items-end gap-2"><button onClick={savePending} disabled={pendBusy} className="text-xs bg-crimson text-white px-3 py-2 rounded-md hover:bg-crimson-deep disabled:opacity-60">{pendBusy?"Saving…":"Save Pending Items"}</button>{(pendingDocs || pendingDeadline) && <button onClick={clearPending} disabled={pendBusy} className="text-xs border border-slate-300 px-3 py-2 rounded-md hover:bg-slate-50 disabled:opacity-60">Clear</button>}<OkNote msg={pendOk} /></div></div><div className="text-[11px] text-slate-500 mt-2">Pending items + deadline are <b>automatically cleared</b> when every mandatory document is accepted.</div></div>

function MiniStat({ big, label, tone, small }) {
  const map = { slate:"bg-slate-50 border-slate-200 text-slate-800", green:"bg-green-50 border-green-200 text-green-700", indigo:"bg-[#fdf5f4] dark:bg-[#281412] border-[#ead9d6] dark:border-[#3d201d] text-crimson-deep", rose:"bg-rose-50 border-rose-200 text-rose-700" };
  return (<div className={`border rounded-xl p-3 text-center ${map[tone]||map.slate}`}><div className={`${small?'text-base':'text-2xl'} font-bold`}>{big}</div><div className="text-xs">{label}</div></div>);
}
function PreviewOverlay({ name, fileName, fetchPath, downloadUrl, close }) {
  const trapRef = useFocusTrap(true, close);
  const pdf = isPdfName(fileName);
  const [blobUrl, setBlobUrl] = useState(null);
  const [loadErr, setLoadErr] = useState("");
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    let objectUrl = null;
    let alive = true;
    setLoading(true);
    setLoadErr("");
    setBlobUrl(null);
    (async () => {
      try {
        const blob = await API.blob(fetchPath);
        if (!alive) return;
        objectUrl = URL.createObjectURL(blob);
        setBlobUrl(objectUrl);
      } catch (ex) {
        if (alive) setLoadErr(ex.message || "Could not load preview.");
      } finally {
        if (alive) setLoading(false);
      }
    })();
    return () => {
      alive = false;
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      setBlobUrl((prev) => { if (prev) URL.revokeObjectURL(prev); return null; });
    };
  }, [fetchPath]);
  return (<div ref={trapRef} className="fixed inset-0 z-[60] bg-black/70 grid place-items-center p-4" onClick={close}><div className="bg-white rounded-2xl max-w-4xl w-full max-h-[94vh] overflow-hidden flex flex-col" onClick={e=>e.stopPropagation()}><div className="p-4 border-b border-slate-200 flex items-center justify-between"><div><div className="text-xs text-slate-500">Secure preview</div><div className="font-semibold text-slate-800">{name}</div><div className="text-[11px] text-slate-500">{fileName}</div></div><div className="flex items-center gap-2">{downloadUrl && <button onClick={()=>window.open(downloadUrl,"_blank")} className="text-xs bg-crimson text-white px-3 py-1.5 rounded-md hover:bg-crimson-deep">Open / Download</button>}<button onClick={close} className="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button></div></div><div className="bg-slate-100 flex-1 overflow-auto grid place-items-center" style={{minHeight:"60vh"}}>{loading ? <Spinner label="Loading preview…" /> : loadErr ? <div className="text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-4 max-w-md text-center">{loadErr}</div> : pdf ? <iframe src={blobUrl} title="preview" className="w-full" style={{height:"75vh",border:"none"}}></iframe> : <img src={blobUrl} alt="document preview" className="max-w-full max-h-[78vh] object-contain" />}</div></div></div>);
}

w && (<div className="mt-4"><div className="grid grid-cols-2 sm:grid-cols-5 gap-2 mb-3"><MiniStat big={String(preview.summary.total)} label="Total rows" tone="slate" small /><MiniStat big={String(preview.summary.valid)} label="Valid" tone="green" small /><MiniStat big={String(preview.summary.invalid)} label="Invalid" tone="rose" small /><MiniStat big={String(preview.summary.duplicateInFile)} label="Dup. in file" tone="amber" small /><MiniStat big={String(preview.summary.duplicateInDb)} label="Dup. in DB" tone="amber" small /></div><div className="flex gap-2 text-xs mb-2">{[["all","All rows"],["valid","Valid only"],["invalid","Errors only"]].map(([k,l])=>(<button key={k} onClick={()=>setFilter(k)} className={`px-2 py-1 rounded border ${filter===k?"bg-crimson text-white border-crimson":"bg-white border-slate-300 text-slate-600"}`}>{l}</button>))}</div><div className="border border-slate-200 rounded-lg overflow-auto max-h-80"><table className="min-w-full text-xs"><thead className="bg-slate-50 text-slate-600 uppercase tracking-wider sticky top-0"><tr><th className="text-left px-3 py-2">Row</th><th className="text-left px-3 py-2">Status</th><th className="text-left px-3 py-2">App No</th><th className="text-left px-3 py-2">Name</th><th className="text-left px-3 py-2">Profile</th><th className="text-left px-3 py-2">Program</th><th className="text-left px-3 py-2">Verification</th><th className="text-left px-3 py-2">Issues</th></tr></thead><tbody>{shownRows.map(r => (<tr key={r.rowNumber} className={`border-t border-slate-100 ${r.status==="invalid"?"bg-rose-50/50":""}`}><td className="px-3 py-2">{r.rowNumber}</td><td className="px-3 py-2"><span className={`font-semibold px-1.5 py-0.5 rounded ${r.status==="valid"?"bg-emerald-100 text-emerald-700":"bg-rose-100 text-rose-700"}`}>{r.status}</span></td><td className="px-3 py-2 font-mono">{r.data?.application_number || r.data?.appNo || "—"}</td><td className="px-3 py-2">{r.data?.full_name || r.data?.name || "—"}</td><td className=           <button onClick={close} className="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
        </div>
        <div className="p-5 overflow-y-auto">
          <ErrorNote msg={err} />
          <OkNote msg={ok} />
          <div className="font-semibold text-slate-800 text-sm mb-2">Current staff accounts</div>
          <div className="border border-slate-200 rounded-lg overflow-hidden">
            {!staff && <div className="p-3 text-sm text-slate-400">Loading…</div>}
            {staff && staff.length === 0 && <div className="p-3 text-sm text-slate-500">No staff accounts found.</div>}
            {staff && staff.length > 0 && (
              <table className="min-w-full text-sm">
                <thead className="bg-slate-50 text-slate-600 text-xs uppercase tracking-wider">
                  <tr>
                    <th className="text-left px-3 py-2">Staff ID</th>
                    <th className="text-left px-3 py-2">Name</th>
                    <th className="text-left px-3 py-2">Role</th>
                    <th className="text-left px-3 py-2">Status</th>
                    <th className="text-left px-3 py-2">Actions</th>

                    return (
                      <tr key={a.staffId} className={`border-t border-slate-100 ${disabled ? "bg-slate-50/80" : ""}`}>
                        <td className="px-3 py-3 font-mono text-xs">{a.staffId}</td>
                        <td className="px-3 py-3">{a.name}</td>
                        <td className="px-3 py-3">
                          <span className={`text-xs font-semibold px-2 py-0.5 rounded ${a.role === "supervisor" ? "bg-[#fdf5f4] text-crimson-deep" : "bg-slate-100 text-slate-600"}`}>{a.role}</span>
                        </td>
                        <td className="px-3 py-3">
                          {verifier ? (
                            <span className={`text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded ${disabled ? "text-rose-700 bg-rose-50 border border-rose-200" : "text-green-700 bg-green-50 border border-green-200"}`}>
                              {disabled ? "Disabled" : "Active"}

                            <span className="text-xs text-slate-400">—</span>

                        </td>
                        <td className="px-3 py-3">
                          {verifier && !self ? (
                            <div className="flex flex-wrap gap-1.5">
                              <button
                                type="button"
                                disabled={!!actionId}
                                onClick={() => toggleEnabled(a, disabled)}
                                className={`text-xs px-2.5 py-1 rounded border disabled:opacity-60 ${disabled ? "border-green-300 text-green-700 hover:bg-green-50" : "border-amber-300 text-amber-800 hover:bg-amber-50"}`}
                              >
                                {busyRow ? (disabled ? "Enabling…" : "Disabling…") : (disabled ? "Enable" : "Disable")}
                              </button>
                              <button
                                type="button"
                                disabled={!!actionId}
                                onClick={() => removeStaff(a)}
                                className="text-xs px-2.5 py-1 rounded border border-rose-300 text-rose-700 hover:bg-rose-50 disabled:opacity-60"
                              >
                                {busyRow ? "Deleting…" : "Delete"}
                              </button>
                            </div>
                          ) : (
                            <span className="text-xs text-slate-400">{self ? "Your account" : "Protected"}</span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
          <form onSubmit={submit} className="mt-5 border-t border-slate-200 pt-4">
            <div className="font-semibold text-slate-800 text-sm mb-2">Add a staff account</div>
            <div className="grid sm:grid-cols-2 gap-3">
              <Field label="Staff ID *"><input required value={f.staffId} onChange={e=>set("staffId",e.target.value)} className="ev-input" /></Field>
              <Field label="Name *"><input required value={f.name} onChange={e=>set("name",e.target.value)} className="ev-input" /></Field>
              <Field label="Password * (min 8 chars)"><input required type="password" value={f.password} onChange={e=>set("password",e.target.value)} className="ev-input" /></Field>
              <Field label="Role"><select value={f.role} onChange={e=>set("role",e.target.value)} className="ev-input"><option value="verifier">Verifier</option><option value="supervisor">Supervisor</option></select></Field>
            </div>
            <button disabled={busy} className="mt-3 text-sm bg-crimson text-white px-4 py-2 rounded-lg hover:bg-crimson-deep disabled:opacity-60">{busy ? "Adding…" : "Add Staff Account"}</button>
          </form>
        </div>
        <div className="p-4 border-t border-slate-200 flex justify-end">
          <button onClick={close} className="text-sm bg-crimson text-white px-4 py-2 rounded-lg hover:bg-crimson-deep">Close</button>
        </div>
      </div>
    </div>
  );
}

function BlacklistModal({ close, isSupervisor }) {
  const trapRef = useFocusTrap(true, close);
  const [entries, setEntries] = useState(null);
  const [policy, setPolicy] = useState("warn");
  const [policyBusy, setPolicyBusy] = useState(false);
  const [f, setF] = useState({ name:"", region:"", reason:"" });
  const [err, setErr] = useState(""); const [ok, setOk] = useState(""); const [busy, setBusy] = useState(false);
  const [q, setQ] = useState("");
  const load = useCallback(async () => {
    try {
      const [b, s] = await Promise.all([API.get("/api/admin/blacklist"), API.get("/api/admin/settings")]);
      setEntries(b.entries);
      setPolicy(s.settings?.blacklist_policy || "warn");
    } catch (ex) { setErr(ex.message); }
  }, []);
  useEffect(() => { load(); }, [load]);
  const set = (k,v) => setF(s=>({ ...s, [k]:v }));
  const add = async (e) => { e.preventDefault(); setErr(""); setOk(""); setBusy(true); try { await API.post("/api/admin/blacklist", f); setOk("Added."); setF({ name:"", region:"", reason:"" }); await load(); } catch (ex) { setErr(ex.message); } setBusy(false); };
  const remove = async (id, name) => { if (!window.confirm(`Remove "${name}"?`)) return; try { await API.del("/api/admin/blacklist/" + id); await load(); } catch (ex) { setErr(ex.message); } };
  const setPol = async (v) => {
    setPolicyBusy(true); setErr("");
    try { await API.patch("/api/admin/settings/blacklist_policy", { value: v }); setPolicy(v); }
    catch (ex) { setErr(ex.message); }
    setPolicyBusy(false);
  };
  const visible = (entries || []).filter(e => !q || e.name.toLowerCase().includes(q.toLowerCase()));
  return (<div ref={trapRef} className="fixed inset-0 z-50 bg-black/40 grid place-items-center p-4"><div className="bg-white rounded-2xl max-w-3xl w-full max-h-[92vh] overflow-hidden flex flex-col"><div className="p-5 border-b border-slate-200 flex items-start justify-between"><div><div className="text-xs text-slate-500">Fake / Non-recognised Institutions</div><div className="font-bold text-slate-800 text-lg">Non-recognised Universities & Boards</div></div><button onClick={close} className="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button></div><div className="p-5 overflow-y-auto"><div className="bg-[#fdf5f4] dark:bg-[#281412] border border-[#ead9d6] dark:border-[#3d201d] rounded-lg p-3 mb-4 text-sm"><div className="font-semibold text-crimson-dark">Validation policy</div><div className="text-xs text-crimson-dark mt-1">Choose what happens when a student enters a non-recognised institution:</div><div className="mt-2 flex items-center gap-2 flex-wrap"><label className="flex items-center gap-1 text-xs"><input type="radio" name="bl_policy" disabled={!isSupervisor||policyBusy} checked={policy==="warn"} onChange={()=>setPol("warn")} /> <b>Warn</b> — flag for staff review but allow the student to continue.</label><label className="flex items-center gap-1 text-xs ml-3"><input type="radio" name="bl_policy" disabled={!isSupervisor||policyBusy} checked={policy==="block"} onChange={()=>setPol("block")} /> <b>Block</b> — refuse "Mark as Ready" on flagged documents.</label></div>{!isSupervisor && <div className="text-[11px] text-slate-500 mt-1">Only Supervisor can change the policy.</div>}</div><div className="flex items-center justify-between flex-wrap gap-2 mb-2"><div className="font-semibold text-slate-800 text-sm">{entries?entries.length:"…"} entries</div><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…" className="ev-input w-full sm:w-56" /></div><div className="border border-slate-200 rounded-lg divide-y max-h-72 overflow-auto">{!entries && <div className="p-3 text-sm text-slate-400">Loading…</div>}{entries && visible.map(e=>(<div key={e.id} className="p-3 flex items-start justify-between gap-2 text-sm"><div><div className="font-medium text-slate-800">{e.name}</div><div className="text-[11px] text-slate-500">{e.region||"—"}{e.reason ? " · "+e.reason : ""}</div></div>{isSupervisor && <button onClick={()=>remove(e.id, e.name)} className="text-xs text-rose-600 hover:underline">Remove</button>}</div>))}</div>{isSupervisor && (<form onSubmit={add} className="mt-5 border-t border-slate-200 pt-4"><div className="font-semibold text-slate-800 text-sm mb-2">Add an institution</div><div className="grid sm:grid-cols-3 gap-3"><div className="sm:col-span-2"><Field label="Institution name *"><input required value={f.name} onChange={e=>set("name",e.target.value)} className="ev-input" /></Field></div><Field label="Region / State"><input value={f.region} onChange={e=>set("region",e.target.value)} className="ev-input" /></Field><div className="sm:col-span-3"><Field label="Reason / note"><input value={f.reason} onChange={e=>set("reason",e.target.value)} className="ev-input" /></Field></div></div><ErrorNote msg={err} /><OkNote msg={ok} /><button disabled={busy} className="mt-3 text-sm bg-rose-600 text-white px-4 py-2 rounded-lg hover:bg-rose-700 disabled:opacity-60">{busy?"Adding…":"Add to Blacklist"}</button></form>)}</div><div className="p-4 border-t border-slate-200 flex justify-end"><button onClick={close} className="text-sm bg-crimson text-white px-4 py-2 rounded-lg hover:bg-crimson-deep">Close</button></div></div></div>);
}

/* SlotMgmtModal — unchanged from v6 (carried forward verbatim). */
const SLOT_STATUS_BADGE = { open:{label:"Open",cls:"bg-green-100 text-green-700 border border-green-300"}, hidden:{label:"Hidden",cls:"bg-slate-100 text-slate-600 border border-slate-300"}, closed:{label:"Closed",cls:"bg-amber-100 text-amber-800 border border-amber-300"}, fully_booked:{label:"Fully Booked",cls:"bg-rose-100 text-rose-800 border border-rose-300"} };
function StatusBadge({ status }) { const b = SLOT_STATUS_BADGE[status] || SLOT_STATUS_BADGE.open; return <span className={`text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded ${b.cls}`}>{b.label}</span>; }
function SlotMgmtModal({ close, isSupervisor }) {
  const trapRef = useFocusTrap(true, close);
  const [slots, setSlots] = useState(null);
  const [stats, setStats] = useState(null);
  const [err, setErr] = useState(""); const [ok, setOk] = useState("");
  const [busy, setBusy] = useState(false);
  const [f, setF] = useState({ date:"", time:"", capacity:20, durationMinutes:30, status:"open" });
  const [tab, setTab] = useState("manage");
  const load = useCallback(async () => { try { const [s, st] = await Promise.all([API.get("/api/admin/slots"), API.get("/api/admin/slots/stats")]); setSlots(s.slots); setStats(st); setErr(""); } catch (ex) { setErr(ex.message); } }, []);
  useEffect(() => { load(); }, [load]);
  const set = (k,v) => setF(s=>({ ...s, [k]:v }));
  const add = async (e) => { e.preventDefault(); setErr(""); setOk(""); setBusy(true); try { await API.post("/api/admin/slots", f); setOk(`Slot ${f.date} ${f.time} added.`); setF({ date:"", time:"", capacity:20, durationMinutes:30, status:"open" }); await load(); } catch (ex) { setErr(ex.message); } setBusy(false); };
  const patchSlot = async (id, patch) => { setErr(""); try { await API.patch("/api/admin/slots/" + id, patch); await load(); } catch (ex) { setErr(ex.message); } };
  const remove = async (id) => { if (!window.confirm("Delete this slot?")) return; try { await API.del("/api/admin/slots/" + id); await load(); } catch (ex) { setErr(ex.message); } };
  const bulkStatus = async (target, opts) => { setErr(""); try { const r = await API.post("/api/admin/slots/bulk-status", { status: target, ...opts }); setOk(`Updated ${r.changed} slot(s).`); await load(); } catch (ex) { setErr(ex.message); } };
  const byDate = useMemo(() => { const m = {}; (slots||[]).forEach(s => { const d = fmtDate(s.date); (m[d] = m[d] || []).push(s); }); return m; }, [slots]);
  const dates = Object.keys(byDate).sort();
  const dateMeta = (date) => (stats?.byDate || []).find(d => fmtDate(d.date) === date) || null;
  return (<div ref={trapRef} className="fixed inset-0 z-50 bg-black/40 grid place-items-center p-4"><div className="bg-white rounded-2xl max-w-5xl w-full max-h-[94vh] overflow-hidden flex flex-col"><div className="p-5 border-b border-slate-200 flex items-start justify-between"><div><div className="text-xs text-slate-500">Reporting Slots</div><div className="font-bold text-slate-800 text-lg">Slot Management</div><div className="text-xs text-slate-500 mt-1">Batch-wise release, dynamic capacity, real-time occupancy.</div></div><button onClick={close} className="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button></div><div className="border-b border-slate-200 px-5"><div className="flex gap-4 text-sm">{[["manage","Manage Dates & Slots"],["stats","Statistics & Utilization"],["add","Add Slot"]].map(t => (<button key={t[0]} onClick={()=>setTab(t[0])} className={`py-3 border-b-2 ${tab===t[0]?'border-crimson text-crimson-deep font-semibold':'border-transparent text-slate-500'}`}>{t[1]}</button>))}</div></div><div className="p-5 overflow-y-auto"><ErrorNote msg={err} /><OkNote msg={ok} />{!slots && <Spinner label="Loading slots…" />}{slots && tab === "stats" && stats && (<div><div className="grid grid-cols-2 sm:grid-cols-4 gap-3"><MiniStat big={String(stats.overall.totalSlots)} label="Total slots" tone="slate" /><MiniStat big={String(stats.overall.totalCapacity)} label="Total capacity" tone="indigo" /><MiniStat big={String(stats.overall.totalBooked)} label="Booked" tone="green" /><MiniStat big={stats.overall.utilizationPct + "%"} label="Overall utilization" tone={stats.overall.utilizationPct>80?"rose":"indigo"} /></div><div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3"><MiniStat big={String(stats.overall.slotsOpen)} label="Open" tone="green" small /><MiniStat big={String(stats.overall.slotsFull)} label="Fully Booked" tone="rose" small /><MiniStat big={String(stats.overall.slotsHidden)} label="Hidden" tone="slate" small /><MiniStat big={String(stats.overall.slotsClosed)} label="Closed" tone="slate" small /></div><div className="font-semibold text-slate-800 text-sm mt-5 mb-2">Booking by Date</div><div className="border border-slate-200 rounded-lg divide-y">{stats.byDate.length === 0 && <div className="p-3 text-sm text-slate-400">No slots created yet.</div>}{stats.byDate.map(d => (<div key={d.date} className="p-3 text-sm"><div className="flex items-center justify-between flex-wrap gap-2"><div className="font-medium text-slate-800">{fmtDate(d.date)}</div><div className="text-xs text-slate-600">{d.booked}/{d.capacity} ({d.utilizationPct}%) · {d.slots} slot(s) · open {d.open}, hidden {d.hidden}, closed {d.closed}</div></div><div className="w-full h-2 mt-2 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full ${d.utilizationPct>80?'bg-rose-500':d.utilizationPct>50?'bg-amber-500':'bg-emerald-500'}`} style={{width: d.utilizationPct + "%"}}></div></div></div>))}</div></div>)}{slots && tab === "manage" && (<div>{isSupervisor && (<div className="bg-[#fdf5f4] dark:bg-[#281412] border border-[#ead9d6] dark:border-[#3d201d] rounded-lg p-3 mb-4 text-sm"><div className="font-semibold text-crimson-dark">Bulk release / hide / close</div><BulkDateReleaser dates={dates} onApply={(targetDates, status) => bulkStatus(status, { dates: targetDates })} /></div>)}{dates.length === 0 && <div className="text-sm text-slate-500">No slots yet. Use "Add Slot" to create one.</div>}{dates.map(date => { const dayMeta = dateMeta(date); const items = byDate[date]; const slotIdsToday = items.map(s => s.id); return (<div key={date} className="border border-slate-200 rounded-lg p-3 mb-3"><div className="flex items-center justify-between flex-wrap gap-2"><div className="font-semibold text-slate-800">{date}<span className="text-xs text-slate-400 ml-2">{items.length} slot(s)</span>{dayMeta && <span className="text-xs text-slate-600 ml-2">· {dayMeta.booked}/{dayMeta.capacity} booked ({dayMeta.utilizationPct}%)</span>}</div>{isSupervisor && (<div className="flex flex-wrap gap-2 text-xs"><button onClick={()=>bulkStatus("open", { ids: slotIdsToday })} className="px-2 py-1 rounded border border-green-300 text-green-700 hover:bg-green-50">Release day (Open)</button><button onClick={()=>bulkStatus("hidden", { ids: slotIdsToday })} className="px-2 py-1 rounded border border-slate-300 text-slate-700 hover:bg-slate-50">Hide day</button><button onClick={()=>bulkStatus("closed", { ids: slotIdsToday })} className="px-2 py-1 rounded border border-amber-300 text-amber-700 hover:bg-amber-50">Close day</button></div>)}</div>{dayMeta && (<div className="w-full h-1.5 mt-2 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full ${dayMeta.utilizationPct>80?'bg-rose-500':dayMeta.utilizationPct>50?'bg-amber-500':'bg-emerald-500'}`} style={{width: dayMeta.utilizationPct + "%"}}></div></div>)}<div className="mt-2 divide-y">{items.map(s => { const occPct = s.capacity ? Math.round((s.booked/s.capacity)*100) : 0; return (<div key={s.id} className="py-2 flex items-center justify-between flex-wrap gap-2 text-sm"><div className="min-w-[160px]"><div className="font-medium">{s.time} <span className="text-[11px] text-slate-500">({s.durationMinutes} min)</span></div><div className="text-[11px] text-slate-500">{s.booked}/{s.capacity} booked · {s.seatsLeft} seats left</div><div className="w-32 h-1 mt-1 bg-slate-100 rounded overflow-hidden"><div className={`h-full ${occPct>=100?'bg-rose-500':occPct>80?'bg-amber-500':'bg-emerald-500'}`} style={{width: Math.min(occPct,100) + "%"}}></div></div></div><div className="flex items-center gap-2 flex-wrap"><StatusBadge status={s.displayStatus} />{isSupervisor && (<><label className="text-xs flex items-center gap-1">status<select value={s.status} onChange={e=>patchSlot(s.id, { status: e.target.value })} className="ev-input py-1 w-auto"><option value="open">Open</option><option value="hidden">Hidden</option><option value="closed">Closed</option></select></label><label className="text-xs flex items-center gap-1">cap<input type="number" min="1" defaultValue={s.capacity} onBlur={e=>{ if (Number(e.target.value)!==s.capacity) patchSlot(s.id, { capacity: e.target.value }); }} className="ev-input w-16 py-1" /></label><label className="text-xs flex items-center gap-1">dur<input type="number" min="5" max="480" defaultValue={s.durationMinutes} onBlur={e=>{ if (Number(e.target.value)!==s.durationMinutes) patchSlot(s.id, { durationMinutes: e.target.value }); }} className="ev-input w-16 py-1" /></label><button disabled={s.booked>0} onClick={()=>remove(s.id)} className={`text-xs px-2 py-1 rounded ${s.booked>0?'border border-slate-200 text-slate-300 cursor-not-allowed':'border border-rose-300 text-rose-600 hover:bg-rose-50'}`}>Delete</button></>)}</div></div>); })}</div></div>); })}</div>)}{slots && tab === "add" && (isSupervisor ? (<form onSubmit={add}><div className="font-semibold text-slate-800 text-sm mb-2">Add a new slot</div><div className="grid sm:grid-cols-5 gap-3 items-end"><Field label="Date *"><input required type="date" value={f.date} onChange={e=>set("date",e.target.value)} className="ev-input" /></Field><Field label="Time *"><input required value={f.time} onChange={e=>set("time",e.target.value)} className="ev-input" placeholder="e.g. 09:30 AM" /></Field><Field label="Capacity *"><input required type="number" min="1" max="1000" value={f.capacity} onChange={e=>set("capacity",e.target.value)} className="ev-input" /></Field><Field label="Duration (min)"><input required type="number" min="5" max="480" value={f.durationMinutes} onChange={e=>set("durationMinutes",e.target.value)} className="ev-input" /></Field><Field label="Initial status"><select value={f.status} onChange={e=>set("status",e.target.value)} className="ev-input"><option value="open">Open (immediately visible)</option><option value="hidden">Hidden (release later)</option><option value="closed">Closed</option></select></Field></div><button disabled={busy} className="mt-3 text-sm bg-crimson text-white px-4 py-2 rounded-lg hover:bg-crimson-deep disabled:opacity-60">{busy?"Adding…":"Add Slot"}</button><div className="text-[11px] text-slate-500 mt-2">Slots on the same date must be ≥ 30 minutes apart.</div></form>) : <div className="text-sm text-slate-500">Only Supervisor accounts can create slots.</div>)}</div><div className="p-4 border-t border-slate-200 flex justify-end"><button onClick={close} className="text-sm bg-crimson text-white px-4 py-2 rounded-lg hover:bg-crimson-deep">Close</button></div></div></div>);
}
function BulkDateReleaser({ dates, onApply }) {
  const [picked, setPicked] = useState({}); const [status, setStatus] = useState("open");
  const toggle = (d) => setPicked(p => ({ ...p, [d]: !p[d] }));
  const selected = Object.keys(picked).filter(d => picked[d]);
  const apply = () => { if (!selected.length) return; onApply(selected, status); setPicked({}); };
  return (<div className="mt-2"><div className="flex flex-wrap gap-1">{dates.length === 0 && <div className="text-xs text-crimson-deep">Add a slot first to enable bulk release.</div>}{dates.map(d => (<button key={d} onClick={()=>toggle(d)} className={`text-xs px-2 py-1 rounded ${picked[d]?'bg-crimson text-white':'bg-white border border-crimson/30 text-crimson-deep hover:bg-[#fdf5f4] dark:hover:bg-[#281412]'}`}>{d}</button>))}</div>{dates.length > 0 && (<div className="mt-2 flex items-center gap-2 flex-wrap"><span className="text-xs text-crimson-dark">{selected.length} date(s) selected →</span><select value={status} onChange={e=>setStatus(e.target.value)} className="ev-input py-1 w-auto"><option value="open">Open (release)</option><option value="hidden">Hidden</option><option value="closed">Closed</option></select><button disabled={!selected.length} onClick={apply} className={`text-xs px-3 py-1 rounded ${selected.length?'bg-crimson text-white hover:bg-crimson-deep':'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>Apply</button></div>)}</div>);
}
