# Render Blueprint — one-click deploy of EduVerify.
# In the Render dashboard: New + -> Blueprint -> connect this repo.
# Render reads this file, creates the web service and the PostgreSQL database,
# and links them automatically.

services:
  - type: web
    name: eduverify
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ORIGIN
        value: "*"                   # tighten to your real URL after first deploy
      - key: DATABASE_URL
        fromDatabase:
          name: eduverify-db
          property: connectionString
      # Cloudinary keys are secret -> set them manually in the dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SEED_ADMIN_ID
        value: ADM-001
      - key: SEED_ADMIN_NAME
        value: Verification Cell Admin
      - key: SEED_ADMIN_PASSWORD
        sync: false                  # set a strong value in the dashboard

databases:
  - name: eduverify-db
    plan: free
    databaseName: eduverify
