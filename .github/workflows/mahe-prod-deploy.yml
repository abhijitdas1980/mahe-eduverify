name: Deploy MAHE Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy-prod" to confirm production deployment
        required: true
        type: string
      skip_health_check:
        description: Skip /api/health check (use if DATABASE_URL not configured yet)
        required: false
        default: false
        type: boolean

concurrency:
  group: mahe-prod-deploy
  cancel-in-progress: false

env:
  AZURE_WEBAPP_NAME: MAHE-CI-DOC-PRD-APP01
  AZURE_WEBAPP_HOST: maheblreduverify.manipal.edu
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'deploy-prod'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Syntax check
        run: node --check server.js

      - name: Deploy to App Service (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PRD }}
          package: .

      - name: Health check
        if: ${{ inputs.skip_health_check != true }}
        run: |
          URL="https://${{ env.AZURE_WEBAPP_HOST }}/api/health"
          echo "Checking $URL"
          for i in 1 2 3 4 5 6 8 10; do
            BODY=$(curl -sS "$URL" 2>/dev/null || true)
            echo "Attempt $i: $BODY"
            if echo "$BODY" | grep -q '"db":"up"'; then
              echo "Production health OK — database connected"
              exit 0
            fi
            if echo "$BODY" | grep -q '"db":"down"'; then
              echo "App is reachable but database is down — set DATABASE_URL on MAHE-CI-DOC-PRD-APP01"
              exit 1
            fi
            sleep 20
          done
          echo "Health check failed — host unreachable or app not started"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### MAHE Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **App Service:** \`${{ env.AZURE_WEBAPP_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://${{ env.AZURE_WEBAPP_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Health:** https://${{ env.AZURE_WEBAPP_HOST }}/api/health" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Admin login:** Verification Cell → ADM-001" >> "$GITHUB_STEP_SUMMARY"
