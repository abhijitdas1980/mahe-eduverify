name: Deploy MAHE Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy-prod" to confirm production deployment
        required: true
        type: string

concurrency:
  group: mahe-prod-deploy
  cancel-in-progress: false

env:
  AZURE_WEBAPP_NAME: MAHE-CI-DOC-PRD-APP01
  AZURE_WEBAPP_HOST: mahe-ci-doc-prd-app01.azurewebsites.net
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'deploy-prod'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Syntax check
        run: node --check server.js

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Health check
        run: |
          URL="https://${{ env.AZURE_WEBAPP_HOST }}/api/health"
          for i in 1 2 3 4 5 6 8 10; do
            BODY=$(curl -fsS "$URL" 2>/dev/null || true)
            if echo "$BODY" | grep -q '"db":"up"'; then
              echo "Production health OK"
              exit 0
            fi
            sleep 20
          done
          exit 1
